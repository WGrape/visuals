<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU组成结构图解</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #00d4ff;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .header p {
            font-size: 1.1em;
            color: #a0a0a0;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: #16213e;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .component-box {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .component-box:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .tooltip {
            position: absolute;
            background: #0f3460;
            color: #fff;
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid #00d4ff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 300px;
            z-index: 1000;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .tooltip.show {
            opacity: 1;
        }

        .tooltip h3 {
            color: #00d4ff;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .data-flow {
            animation: flow 2s linear infinite;
        }

        @keyframes flow {
            0% { stroke-dashoffset: 20; }
            100% { stroke-dashoffset: 0; }
        }

        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔬 CPU 组成结构图解</h1>
        <p>中央处理器（Central Processing Unit）内部组成与工作原理</p>
    </div>

    <div class="container">
        <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
            <!-- 定义箭头 -->
            <defs>
                <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#00d4ff"/>
                </marker>
                <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#00ff88"/>
                </marker>
                <marker id="arroworange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                    <path d="M0,0 L0,6 L9,3 z" fill="#ffa500"/>
                </marker>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
            </defs>

            <!-- 外框：计算机系统中的CPU -->
            <rect x="50" y="50" width="1100" height="700" fill="#0f3460" stroke="#00d4ff" stroke-width="3" rx="15"/>
            <text x="600" y="90" font-size="28" fill="#00d4ff" text-anchor="middle" font-weight="bold">CPU 内部结构</text>

            <!-- CPU主框 -->
            <rect x="300" y="150" width="600" height="500" fill="#16213e" stroke="#00d4ff" stroke-width="4" rx="20" class="pulse"/>
            <text x="600" y="190" font-size="32" fill="#00d4ff" text-anchor="middle" font-weight="bold" filter="url(#glow)">CPU</text>

            <!-- 运算器 ALU -->
            <g class="component-box" data-tooltip="alu">
                <rect x="400" y="250" width="200" height="120" fill="#1a5276" stroke="#00d4ff" stroke-width="3" rx="10"/>
                <text x="500" y="290" font-size="24" fill="#00d4ff" text-anchor="middle" font-weight="bold">运算器</text>
                <text x="500" y="320" font-size="18" fill="#00ff88" text-anchor="middle">ALU</text>
                <text x="500" y="350" font-size="14" fill="#a0a0a0" text-anchor="middle">Arithmetic Logic</text>
                <text x="500" y="370" font-size="14" fill="#a0a0a0" text-anchor="middle">Unit</text>
            </g>

            <!-- 控制器 CU -->
            <g class="component-box" data-tooltip="cu">
                <rect x="400" y="430" width="200" height="120" fill="#1a5276" stroke="#ffa500" stroke-width="3" rx="10"/>
                <text x="500" y="470" font-size="24" fill="#ffa500" text-anchor="middle" font-weight="bold">控制器</text>
                <text x="500" y="500" font-size="18" fill="#00ff88" text-anchor="middle">CU</text>
                <text x="500" y="530" font-size="14" fill="#a0a0a0" text-anchor="middle">Control Unit</text>
            </g>

            <!-- 寄存器组 -->
            <g class="component-box" data-tooltip="register">
                <rect x="680" y="250" width="180" height="120" fill="#1a5276" stroke="#ff6b6b" stroke-width="3" rx="10"/>
                <text x="770" y="290" font-size="22" fill="#ff6b6b" text-anchor="middle" font-weight="bold">寄存器组</text>
                <text x="770" y="320" font-size="16" fill="#00ff88" text-anchor="middle">Registers</text>
                <text x="770" y="350" font-size="13" fill="#a0a0a0" text-anchor="middle">• 通用寄存器</text>
                <text x="770" y="370" font-size="13" fill="#a0a0a0" text-anchor="middle">• 指令寄存器</text>
                <text x="770" y="390" font-size="13" fill="#a0a0a0" text-anchor="middle">• 程序计数器</text>
            </g>

            <!-- 缓存 Cache -->
            <g class="component-box" data-tooltip="cache">
                <rect x="680" y="430" width="180" height="120" fill="#1a5276" stroke="#ffd93d" stroke-width="3" rx="10"/>
                <text x="770" y="470" font-size="22" fill="#ffd93d" text-anchor="middle" font-weight="bold">缓存</text>
                <text x="770" y="500" font-size="16" fill="#00ff88" text-anchor="middle">Cache</text>
                <text x="770" y="530" font-size="13" fill="#a0a0a0" text-anchor="middle">L1 / L2 / L3</text>
            </g>

            <!-- 内部总线 -->
            <line x1="600" y1="310" x2="600" y2="430" stroke="#00d4ff" stroke-width="4" stroke-dasharray="10,5" class="data-flow"/>
            <line x1="600" y1="250" x2="600" y2="550" stroke="#00d4ff" stroke-width="4" stroke-dasharray="10,5" class="data-flow"/>
            <line x1="380" y1="370" x2="680" y2="370" stroke="#00d4ff" stroke-width="4" stroke-dasharray="10,5" class="data-flow"/>

            <!-- 连接线标签 -->
            <text x="620" y="370" font-size="14" fill="#00d4ff">内部总线</text>

            <!-- 外部连接：主存储器 -->
            <g class="component-box" data-tooltip="memory">
                <rect x="100" y="300" width="150" height="100" fill="#1a5276" stroke="#a29bfe" stroke-width="3" rx="10"/>
                <text x="175" y="340" font-size="20" fill="#a29bfe" text-anchor="middle" font-weight="bold">主存储器</text>
                <text x="175" y="370" font-size="16" fill="#00ff88" text-anchor="middle">RAM</text>
                <text x="175" y="395" font-size="13" fill="#a0a0a0" text-anchor="middle">内存</text>
            </g>

            <!-- 外部连接：I/O接口 -->
            <g class="component-box" data-tooltip="io">
                <rect x="950" y="300" width="150" height="100" fill="#1a5276" stroke="#fd79a8" stroke-width="3" rx="10"/>
                <text x="1025" y="340" font-size="20" fill="#fd79a8" text-anchor="middle" font-weight="bold">I/O 接口</text>
                <text x="1025" y="370" font-size="16" fill="#00ff88" text-anchor="middle">Input/Output</text>
                <text x="1025" y="395" font-size="13" fill="#a0a0a0" text-anchor="middle">输入输出</text>
            </g>

            <!-- 系统总线 -->
            <line x1="250" y1="350" x2="300" y2="350" stroke="#a29bfe" stroke-width="4" marker-end="url(#arrowgreen)" class="data-flow"/>
            <line x1="900" y1="350" x2="950" y2="350" stroke="#fd79a8" stroke-width="4" marker-end="url(#arroworange)" class="data-flow"/>
            
            <!-- 总线标签 -->
            <text x="270" y="340" font-size="13" fill="#a29bfe">地址/数据总线</text>
            <text x="920" y="340" font-size="13" fill="#fd79a8">I/O总线</text>

            <!-- 时钟信号 -->
            <g class="component-box" data-tooltip="clock">
                <rect x="500" y="620" width="200" height="60" fill="#1a5276" stroke="#00ff88" stroke-width="3" rx="10"/>
                <text x="600" y="650" font-size="18" fill="#00ff88" text-anchor="middle" font-weight="bold">时钟信号 Clock</text>
            </g>

            <line x1="600" y1="550" x2="600" y2="620" stroke="#00ff88" stroke-width="3" stroke-dasharray="8,4" class="data-flow"/>

            <!-- 标注说明 -->
            <text x="600" y="730" font-size="16" fill="#a0a0a0" text-anchor="middle">点击各组件查看详细说明 | 虚线表示数据流动方向</text>

        </svg>

        <!-- 图例 -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: #00d4ff;"></div>
                <span>运算器 ALU</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ffa500;"></div>
                <span>控制器 CU</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ff6b6b;"></div>
                <span>寄存器</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #ffd93d;"></div>
                <span>缓存 Cache</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: #a29bfe;"></div>
                <span>主存储器</span>
            </div>
        </div>
    </div>

    <!-- 工具提示 -->
    <div class="tooltip" id="tooltip">
        <h3 id="tooltip-title"></h3>
        <div id="tooltip-content"></div>
    </div>

    <script>
        const tooltipData = {
            alu: {
                title: "运算器 (ALU)",
                content: `<strong>功能：</strong>执行所有的算术和逻辑运算<br/><br/>
                <strong>主要操作：</strong><br/>
                • 算术运算：加、减、乘、除<br/>
                • 逻辑运算：与、或、非、异或<br/>
                • 移位操作：左移、右移<br/><br/>
                <strong>组成：</strong>ALU核心、累加器(ACC)、数据缓冲寄存器`
            },
            cu: {
                title: "控制器 (CU)",
                content: `<strong>功能：</strong>控制CPU的工作流程，指挥各部件协同工作<br/><br/>
                <strong>主要任务：</strong><br/>
                1. <strong>取指</strong>：从内存读取指令<br/>
                2. <strong>译码</strong>：解析指令含义<br/>
                3. <strong>执行</strong>：发出控制信号<br/><br/>
                <strong>组成：</strong>指令寄存器(IR)、程序计数器(PC)、指令译码器`
            },
            register: {
                title: "寄存器组 (Registers)",
                content: `<strong>功能：</strong>CPU内部的高速存储单元<br/><br/>
                <strong>分类：</strong><br/>
                • <strong>通用寄存器</strong>：存储操作数和结果<br/>
                • <strong>专用寄存器</strong>：<br/>
                  &nbsp;&nbsp;- PC：程序计数器<br/>
                  &nbsp;&nbsp;- IR：指令寄存器<br/>
                  &nbsp;&nbsp;- PSW：程序状态字<br/><br/>
                <strong>特点：</strong>速度最快，容量最小`
            },
            cache: {
                title: "缓存 (Cache)",
                content: `<strong>功能：</strong>缓解CPU与主存之间的速度差异<br/><br/>
                <strong>层级结构：</strong><br/>
                • <strong>L1 Cache</strong>：一级缓存，内置在CPU中<br/>
                • <strong>L2 Cache</strong>：二级缓存<br/>
                • <strong>L3 Cache</strong>：三级缓存，多核共享<br/><br/>
                <strong>原理：</strong>局部性原理（时间局部性 + 空间局部性）`
            },
            memory: {
                title: "主存储器 (RAM)",
                content: `<strong>功能：</strong>存储正在运行的程序和数据<br/><br/>
                <strong>特点：</strong><br/>
                • 速度比CPU慢，比外存快<br/>
                • 随机存取<br/>
                • 断电数据丢失（易失性）<br/><br/>
                <strong>层次：</strong>CPU > 寄存器 > Cache > 内存 > 外存`
            },
            io: {
                title: "I/O 接口",
                content: `<strong>功能：</strong>CPU与外部设备之间的桥梁<br/><br/>
                <strong>常见I/O设备：</strong><br/>
                • 键盘、鼠标（输入）<br/>
                • 显示器、打印机（输出）<br/>
                • 硬盘、网卡（存储/通信）<br/><br/>
                <strong>传输方式：</strong>轮询、中断、DMA`
            },
            clock: {
                title: "时钟信号 (Clock)",
                content: `<strong>功能：</strong>为CPU提供同步时序信号<br/><br/>
                <strong>主频：</strong>时钟频率，如 3.5GHz<br/>
                <strong>时钟周期：</strong>1 / 主频<br/><br/>
                <strong>CPI：</strong>执行一条指令需要的时钟周期数<br/><br/>
                <strong>CPU性能公式：</strong><br/>
                程序执行时间 = 指令数 × CPI × 时钟周期`
            }
        };

        const tooltip = document.getElementById('tooltip');
        const tooltipTitle = document.getElementById('tooltip-title');
        const tooltipContent = document.getElementById('tooltip-content');

        document.querySelectorAll('.component-box').forEach(el => {
            el.addEventListener('mouseenter', (e) => {
                const key = e.currentTarget.getAttribute('data-tooltip');
                const data = tooltipData[key];
                if (data) {
                    tooltipTitle.textContent = data.title;
                    tooltipContent.innerHTML = data.content;
                    tooltip.classList.add('show');
                }
            });

            el.addEventListener('mousemove', (e) => {
                tooltip.style.left = e.pageX + 20 + 'px';
                tooltip.style.top = e.pageY - 100 + 'px';
            });

            el.addEventListener('mouseleave', () => {
                tooltip.classList.remove('show');
            });
        });
    </script>
</body>
</html>
