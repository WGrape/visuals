<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Python asyncio Event Loop 核心运行流程</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e0e0e0;
    font-family: 'SF Pro Display', -apple-system, 'PingFang SC', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    width: 1100px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #00d2ff, #00ff88);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 36px;
  }
  svg { width: 100%; height: auto; }

  /* 节点样式 */
  .node-box { cursor: default; }
  .node-box:hover .node-rect { filter: brightness(1.2); }

  /* 数据结构标签 */
  .ds-label {
    font-size: 11px;
    fill: #ff9f43;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Python asyncio Event Loop 核心运行流程</h1>
  <p class="subtitle">Single-Threaded Asynchronous I/O — 事件循环每一次迭代的工作步骤</p>

  <svg viewBox="0 0 1100 820" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- 箭头标记 -->
      <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#00d2ff"/>
      </marker>
      <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#00ff88"/>
      </marker>
      <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ff9f43"/>
      </marker>
      <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
      </marker>
      <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
      </marker>

      <!-- 发光效果 -->
      <filter id="glow-cyan">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-green">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <!-- 渐变 -->
      <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
      </linearGradient>
    </defs>

    <!-- ============ 背景装饰 ============ -->
    <circle cx="550" cy="410" r="300" fill="none" stroke="#1a1a3e" stroke-width="1" stroke-dasharray="8,6"/>
    <circle cx="550" cy="410" r="240" fill="none" stroke="#1a1a3e" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- ============ 步骤编号与节点 ============ -->

    <!-- ====== STEP 1: Ready Queue (顶部中央) ====== -->
    <g class="node-box" transform="translate(380, 40)">
      <rect class="node-rect" x="0" y="0" width="340" height="100" rx="12" fill="#0d2818" stroke="#10b981" stroke-width="2"/>
      <rect x="0" y="0" width="340" height="100" rx="12" fill="url(#grad-green)" opacity="0.15"/>
      <!-- Step badge -->
      <circle cx="28" cy="28" r="16" fill="url(#grad-green)"/>
      <text x="28" y="33" text-anchor="middle" fill="white" font-size="14" font-weight="700">1</text>
      <!-- Title -->
      <text x="56" y="33" fill="#00ff88" font-size="16" font-weight="600">就绪队列执行</text>
      <text x="56" y="52" fill="#aaa" font-size="12">Execute Ready Callbacks</text>
      <!-- Data structure -->
      <text x="56" y="78" class="ds-label">collections.deque  _ready</text>
      <!-- Queue visualization -->
      <g transform="translate(240, 58)">
        <rect x="0" y="0" width="24" height="18" rx="3" fill="#10b981" opacity="0.6"/>
        <rect x="28" y="0" width="24" height="18" rx="3" fill="#10b981" opacity="0.45"/>
        <rect x="56" y="0" width="24" height="18" rx="3" fill="#10b981" opacity="0.3"/>
      </g>
    </g>

    <!-- ====== STEP 2: Select I/O (右侧) ====== -->
    <g class="node-box" transform="translate(740, 310)">
      <rect class="node-rect" x="0" y="0" width="320" height="100" rx="12" fill="#1a1508" stroke="#f59e0b" stroke-width="2"/>
      <rect x="0" y="0" width="320" height="100" rx="12" fill="url(#grad-orange)" opacity="0.15"/>
      <circle cx="28" cy="28" r="16" fill="url(#grad-orange)"/>
      <text x="28" y="33" text-anchor="middle" fill="white" font-size="14" font-weight="700">2</text>
      <text x="56" y="33" fill="#ff9f43" font-size="16" font-weight="600">I/O 多路复用等待</text>
      <text x="56" y="52" fill="#aaa" font-size="12">selector.select(timeout)</text>
      <text x="56" y="78" class="ds-label">epoll / kqueue / IOCP</text>
    </g>

    <!-- ====== STEP 3: Process I/O Events (右下) ====== -->
    <g class="node-box" transform="translate(620, 570)">
      <rect class="node-rect" x="0" y="0" width="340" height="100" rx="12" fill="#1a0d28" stroke="#8b5cf6" stroke-width="2"/>
      <rect x="0" y="0" width="340" height="100" rx="12" fill="url(#grad-purple)" opacity="0.15"/>
      <circle cx="28" cy="28" r="16" fill="url(#grad-purple)"/>
      <text x="28" y="33" text-anchor="middle" fill="white" font-size="14" font-weight="700">3</text>
      <text x="56" y="33" fill="#a78bfa" font-size="16" font-weight="600">处理 I/O 就绪事件</text>
      <text x="56" y="52" fill="#aaa" font-size="12">将回调加入 _ready 队列</text>
      <text x="56" y="78" class="ds-label">sock_readable → callback</text>
    </g>

    <!-- ====== STEP 4: Process Timers (左侧) ====== -->
    <g class="node-box" transform="translate(40, 310)">
      <rect class="node-rect" x="0" y="0" width="320" height="100" rx="12" fill="#1a0a0a" stroke="#ef4444" stroke-width="2"/>
      <rect x="0" y="0" width="320" height="100" rx="12" fill="url(#grad-red)" opacity="0.15"/>
      <circle cx="28" cy="28" r="16" fill="url(#grad-red)"/>
      <text x="28" y="33" text-anchor="middle" fill="white" font-size="14" font-weight="700">4</text>
      <text x="56" y="33" fill="#ff6b6b" font-size="16" font-weight="600">检查定时器堆</text>
      <text x="56" y="52" fill="#aaa" font-size="12">Process Scheduled Timers</text>
      <text x="56" y="78" class="ds-label">heapq  _scheduled（最小堆）</text>
    </g>

    <!-- ============ 连接箭头（主循环） ============ -->

    <!-- Step1 → Step2: 执行回调，遇到 await/注册 I/O -->
    <path d="M 720 110 Q 830 110, 880 310"
          fill="none" stroke="#00d2ff" stroke-width="2.5" marker-end="url(#arrow-cyan)" opacity="0.9"/>
    <text x="830" y="195" fill="#00d2ff" font-size="12" font-weight="500"
          transform="rotate(60, 830, 195)">遇到 await I/O</text>

    <!-- Step2 → Step3: I/O 就绪事件返回 -->
    <path d="M 900 420 Q 900 520, 790 580"
          fill="none" stroke="#ff9f43" stroke-width="2.5" marker-end="url(#arrow-orange)" opacity="0.9"/>
    <text x="875" y="510" fill="#ff9f43" font-size="12" font-weight="500"
          transform="rotate(70, 875, 510)">I/O 就绪返回</text>

    <!-- Step3 → Step1: 回调加入就绪队列（大弧线回到顶部） -->
    <path d="M 620 630 Q 420 700, 400 140"
          fill="none" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow-purple)" opacity="0.9"
          stroke-dasharray="8,4"/>
    <text x="370" y="460" fill="#a78bfa" font-size="12" font-weight="500"
          transform="rotate(-82, 370, 460)">回调入队 _ready</text>

    <!-- Step4 → Step1: 到期回调加入就绪队列 -->
    <path d="M 200 310 Q 300 200, 400 140"
          fill="none" stroke="#ff6b6b" stroke-width="2.5" marker-end="url(#arrow-red)" opacity="0.9"
          stroke-dasharray="8,4"/>
    <text x="235" y="230" fill="#ff6b6b" font-size="12" font-weight="500"
          transform="rotate(-40, 235, 230)">到期回调入队</text>

    <!-- Step2 → Step4: 计算 timeout 传给 select -->
    <path d="M 740 370 L 360 370"
          fill="none" stroke="#00d2ff" stroke-width="2" marker-end="url(#arrow-cyan)" opacity="0.7"
          stroke-dasharray="6,4"/>
    <text x="550" y="365" text-anchor="middle" fill="#00d2ff" font-size="11">timeout = next_timer - now</text>

    <!-- ============ 中心循环标记 ============ -->
    <g transform="translate(550, 385)">
      <circle r="45" fill="#0f0f1a" stroke="#333" stroke-width="1.5"/>
      <text x="0" y="-8" text-anchor="middle" fill="#555" font-size="11">INFINITE</text>
      <text x="0" y="12" text-anchor="middle" fill="#555" font-size="11">LOOP</text>
      <!-- 循环箭头 -->
      <path d="M -30 35 A 40 40 0 1 1 30 35" fill="none" stroke="#333" stroke-width="1.5" marker-end="url(#arrow-cyan)" opacity="0.5"/>
    </g>

    <!-- ============ 底部协程生命周期示意 ============ -->
    <g transform="translate(40, 710)">
      <rect x="0" y="0" width="1020" height="80" rx="10" fill="#111122" stroke="#333" stroke-width="1"/>
      <text x="510" y="22" text-anchor="middle" fill="#888" font-size="12" font-weight="500">协程生命周期 Corouting Lifecycle</text>

      <!-- 流程 -->
      <g transform="translate(30, 40)">
        <rect x="0" y="0" width="100" height="28" rx="6" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
        <text x="50" y="18" text-anchor="middle" fill="#00ff88" font-size="12">创建协程</text>
      </g>
      <text x="145" y="58" fill="#555" font-size="16">→</text>
      <g transform="translate(160, 40)">
        <rect x="0" y="0" width="100" height="28" rx="6" fill="#06b6d4" opacity="0.3" stroke="#06b6d4" stroke-width="1"/>
        <text x="50" y="18" text-anchor="middle" fill="#00d2ff" font-size="12">加入就绪队列</text>
      </g>
      <text x="275" y="58" fill="#555" font-size="16">→</text>
      <g transform="translate(290, 40)">
        <rect x="0" y="0" width="100" height="28" rx="6" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1"/>
        <text x="50" y="18" text-anchor="middle" fill="#ff9f43" font-size="12">执行中</text>
      </g>
      <text x="405" y="58" fill="#555" font-size="16">→</text>
      <g transform="translate(420, 40)">
        <rect x="0" y="0" width="100" height="28" rx="6" fill="#8b5cf6" opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
        <text x="50" y="18" text-anchor="middle" fill="#a78bfa" font-size="12">await 挂起</text>
      </g>
      <text x="535" y="58" fill="#555" font-size="16">→</text>
      <g transform="translate(550, 40)">
        <rect x="0" y="0" width="100" height="28" rx="6" fill="#333" opacity="0.5" stroke="#555" stroke-width="1"/>
        <text x="50" y="18" text-anchor="middle" fill="#888" font-size="12">等待 I/O</text>
      </g>
      <text x="665" y="58" fill="#555" font-size="16">→</text>
      <g transform="translate(680, 40)">
        <rect x="0" y="0" width="120" height="28" rx="6" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="1"/>
        <text x="60" y="18" text-anchor="middle" fill="#00ff88" font-size="12">I/O完成 → 恢复</text>
      </g>
      <text x="815" y="58" fill="#555" font-size="16">→</text>
      <g transform="translate(830, 40)">
        <rect x="0" y="0" width="100" height="28" rx="6" fill="#06b6d4" opacity="0.3" stroke="#06b6d4" stroke-width="1"/>
        <text x="50" y="18" text-anchor="middle" fill="#00d2ff" font-size="12">返回结果</text>
      </g>
    </g>
  </svg>
</div>
</body>
</html>
