<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redis 命令分类图解</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e4e4e4;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 30px 20px 15px;
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: #a0a0a0;
            font-size: 1em;
        }

        .container {
            display: flex;
            max-width: 1600px;
            margin: 0 auto;
            padding: 15px;
            gap: 20px;
        }

        .main-section {
            flex: 1;
            min-width: 0;
        }

        .flowchart-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 0, 0.1);
            border-radius: 16px;
            padding: 20px;
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .flowchart-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
        }

        #flowchart {
            min-width: 1400px;
            height: 750px;
        }

        .detail-section {
            width: 400px;
            flex-shrink: 0;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 20px;
            position: sticky;
            top: 15px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .detail-card h2 {
            color: #48dbfb;
            font-size: 1.3em;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-card .description {
            color: #d0d0d0;
            line-height: 1.7;
            margin-bottom: 15px;
            font-size: 0.95em;
        }

        .detail-card .cmd-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .detail-card .cmd-tag {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 4px 8px;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.8em;
            color: #7ee787;
            cursor: pointer;
            transition: all 0.2s;
        }

        .detail-card .cmd-tag:hover {
            background: rgba(126, 231, 135, 0.2);
            border-color: #7ee787;
        }

        .detail-card .example {
            background: #0d1117;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Fira Code', 'JetBrains Mono', monospace;
            font-size: 0.85em;
            color: #7ee787;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .detail-card .scenario {
            background: rgba(72, 219, 251, 0.1);
            border: 1px solid rgba(72, 219, 251, 0.2);
            border-radius: 8px;
            padding: 12px;
        }

        .detail-card .scenario h4 {
            color: #48dbfb;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .detail-card .scenario p {
            font-size: 0.85em;
            color: #b0b0b0;
            line-height: 1.5;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8em;
            color: #a0a0a0;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }

        .hint-text {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-top: 12px;
        }

        /* Animation for active path */
        .active-path {
            stroke-dasharray: 5, 5;
            animation: dash 0.5s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -10;
            }
        }

        /* Node Styles */
        .node rect {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover rect {
            filter: brightness(1.2);
        }

        .node text {
            pointer-events: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .link {
            fill: none;
            stroke-width: 2;
            transition: all 0.3s ease;
        }

        .link-label {
            font-size: 11px;
            fill: #888;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        /* Animated pulse for root */
        .pulse-circle {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.85em;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }
            .detail-section {
                width: 100%;
            }
            .detail-card {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔑 Redis 命令分类全景图</h1>
        <p>单一命令 vs 多Key命令 · 操作类型 · 典型示例</p>
    </div>

    <div class="container">
        <div class="main-section">
            <div class="flowchart-container">
                <svg id="flowchart"></svg>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff6b6b;"></div>
                    <span>Redis命令入口</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #3498db;"></div>
                    <span>单一Key命令</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #9b59b6;"></div>
                    <span>多Key命令</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f39c12;"></div>
                    <span>数据操作</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #27ae60;"></div>
                    <span>管理操作</span>
                </div>
            </div>
            <p class="hint-text">💡 点击任意节点查看详细命令 | 节点显示命令数量</p>
        </div>

        <div class="detail-section">
            <div class="detail-card" id="detailCard">
                <h2>👈 点击选择一个节点</h2>
                <p class="description">点击左侧流程图中的任意节点，这里将显示该类型的所有命令和示例。</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>基于 Redis 官方文档 · Redis 7.x</p>
    </div>

    <script>
        // Redis命令数据
        const commandData = {
            'root': {
                title: 'Redis 命令',
                color: '#ff6b6b',
                description: 'Redis提供了丰富的命令来操作不同类型的数据。命令可以分为两大类：单一Key命令（操作单个Key）和多Key命令（操作多个Key或涉及Key管理）。',
                subType: 'root'
            },
            'single': {
                title: '单一Key命令',
                color: '#3498db',
                description: '只操作单个Key的命令。这是Redis最常用的命令类型，适用于String、Hash、List、Set、ZSet等所有数据类型的基本操作。',
                subType: 'single'
            },
            'multi': {
                title: '多Key命令',
                color: '#9b59b6',
                description: '涉及多个Key的命令。包括批量操作、Key管理、集合运算、事务、发布订阅等多种场景。这类命令通常以M开头（如MGET、MSET）或涉及Key模式匹配（如KEYS、SCAN）。',
                subType: 'multi'
            },
            // 单一Key - String
            'string-read': {
                title: 'String 读取',
                color: '#3498db',
                description: 'String类型的读取操作。String是Redis最基本的数据类型，可以存储字符串、整数或浮点数。',
                commands: ['GET', 'MGET', 'GETRANGE', 'STRLEN', 'GETSET', 'GETDEL', 'GETEX'],
                example: 'GET user:1001\nMGET user:1001 user:1002 user:1003\nGETRANGE key 0 4  # 获取前5个字符',
                scenario: '缓存用户信息、配置参数、session数据等。'
            },
            'string-write': {
                title: 'String 写入',
                color: '#3498db',
                description: 'String类型的写入操作。SET命令会覆盖已有值，SETNX只在Key不存在时设置。',
                commands: ['SET', 'SETNX', 'SETEX', 'SETXX', 'MSET', 'MSETNX', 'SETRANGE', 'APPEND', 'INCR', 'INCRBY', 'DECR', 'DECRBY', 'INCRBYFLOAT', 'SETGET'],
                example: 'SET user:1001 "Alice"\nSETNX lock:resource "id"\nSETEX session:abc 3600 "data"\nINCR counter',
                scenario: '计数器、分布式锁、缓存写入、限流计数等。'
            },
            // 单一Key - Hash
            'hash-read': {
                title: 'Hash 读取',
                color: '#3498db',
                description: 'Hash类型的读取操作。Hash是field-value对的集合，适合存储对象。',
                commands: ['HGET', 'HGETALL', 'HMGET', 'HEXISTS', 'HLEN', 'HKEYS', 'HVALS', 'HSCAN'],
                example: 'HGET user:1001 name\nHGETALL user:1001\nHMGET user:1001 name email phone',
                scenario: '存储用户对象、商品详情、配置对象等结构化数据。'
            },
            'hash-write': {
                title: 'Hash 写入',
                color: '#3498db',
                description: 'Hash类型的写入操作。HSET可以逐个或批量设置field，HINCRBY对数值field做增减。',
                commands: ['HSET', 'HSETNX', 'HMSET', 'HDEL', 'HINCRBY', 'HINCRBYFLOAT'],
                example: 'HSET user:1001 name "Alice" age 25\nHMSET user:1001 email "a@b.com" phone "123"\nHINCRBY user:1001 age 1',
                scenario: '用户资料管理、对象存储、计数器（按field维度）。'
            },
            // 单一Key - List
            'list-read': {
                title: 'List 读取',
                color: '#3498db',
                description: 'List类型的读取操作。List是按插入顺序排列的字符串列表，支持两端操作。',
                commands: ['LPOP', 'RPOP', 'BLPOP', 'BRPOP', 'LINDEX', 'LLEN', 'LRANGE', 'LPOS'],
                example: 'LRANGE notifications 0 9  # 获取前10条\nLINDEX timeline 5      # 获取第6条\nLLEN message:queue',
                scenario: '消息队列、最新消息列表、任务队列、访问日志等。'
            },
            'list-write': {
                title: 'List 写入',
                color: '#3498db',
                description: 'List类型的写入操作。LPUSH/RPUSH从列表两端插入，LINSERT在指定位置插入，LREM删除指定元素。',
                commands: ['LPUSH', 'RPUSH', 'LPUSHX', 'RPUSHX', 'LINSERT', 'LSET', 'LTRIM', 'LREM', 'LREM'],
                example: 'LPUSH queue:tasks "task1"\nRPUSH timeline "new_post"\nLTRIM feed 0 99  # 只保留前100条',
                scenario: '任务队列、消息队列、最新N条记录、栈结构等。'
            },
            // 单一Key - Set
            'set-read': {
                title: 'Set 读取',
                color: '#3498db',
                description: 'Set类型的读取操作。Set是无序不重复的字符串集合，支持集合运算。',
                commands: ['SMEMBERS', 'SISMEMBER', 'SCARD', 'SRANDMEMBER', 'SINTER', 'SUNION', 'SDIFF'],
                example: 'SMEMBERS tags:redis\nSISMEMBER tags:redis "缓存"\nSCARD tags:redis\nSRANDMEMBER colors 3  # 随机3个',
                scenario: '标签系统、好友列表、去重集合、随机抽奖等。'
            },
            'set-write': {
                title: 'Set 写入',
                color: '#3498db',
                description: 'Set类型的写入操作。SADD添加元素（自动去重），SREM删除元素，SMOVE移动元素。',
                commands: ['SADD', 'SREM', 'SPOP', 'SMOVE', 'SINTERSTORE', 'SUNIONSTORE', 'SDIFFSTORE'],
                example: 'SADD tags:redis "缓存" "NoSQL" "内存数据库"\nSREM tags:redis "旧标签"\nSPOP winners 5  # 随机抽取5人',
                scenario: '标签管理、抽奖活动、关注/粉丝列表等。'
            },
            // 单一Key - ZSet
            'zset-read': {
                title: 'ZSet 读取',
                color: '#3498db',
                description: 'Sorted Set（有序集合）的读取操作。ZSet每个元素关联一个分数，按分数排序。',
                commands: ['ZRANGE', 'ZREVRANGE', 'ZRANGEBYSCORE', 'ZREVRANGEBYSCORE', 'ZRANK', 'ZREVRANK', 'ZSCORE', 'ZCOUNT', 'ZCARD'],
                example: 'ZRANGE leaderboard 0 9 WITHSCORES\nZREVRANK leaderboard "Alice"\nZSCORE leaderboard "Alice"\nZRANGEBYSCORE salary 10000 50000',
                scenario: '排行榜、权重排序、延迟队列、分数区间查询等。'
            },
            'zset-write': {
                title: 'ZSet 写入',
                color: '#3498db',
                description: 'Sorted Set（有序集合）的写入操作。ZADD添加或更新元素及分数，ZINCRBY增加分数。',
                commands: ['ZADD', 'ZINCRBY', 'ZREM', 'ZREMRANGEBYRANK', 'ZREMRANGEBYSCORE', 'ZUNIONSTORE', 'ZINTERSTORE'],
                example: 'ZADD leaderboard 100 "Alice"\nZINCRBY leaderboard 50 "Alice"\nZREM leaderboard "Bob"\nZREMRANGEBYSCORE salary 0 5000',
                scenario: '实时排行榜、用户积分、游戏得分、延迟任务排序等。'
            },
            // 多Key - Key管理
            'key-manage': {
                title: 'Key 管理',
                color: '#9b59b6',
                description: 'Key的查询、删除、过期时间管理等操作。这些命令影响一个或多个Key。',
                commands: ['KEYS', 'SCAN', 'EXISTS', 'DEL', 'UNLINK', 'RENAME', 'RENAMENX', 'MOVE', 'COPY', 'TYPE', 'OBJECT', 'TOUCH', 'PERSIST', 'DUMP', 'RESTORE'],
                example: 'KEYS user:*\nSCAN 0 MATCH user:* COUNT 100\nEXISTS user:1 user:2 user:3\nEXPIRE user:1 3600',
                scenario: 'Key模式查询、缓存清理、Key迁移、数据导出导入等。'
            },
            'key-ttl': {
                title: '过期时间管理',
                color: '#9b59b6',
                description: '管理Key的TTL（生存时间）。可以设置、查询、修改Key的过期时间。',
                commands: ['EXPIRE', 'PEXPIRE', 'EXPIREAT', 'PEXPIREAT', 'TTL', 'PTTL', 'EXPIRETIME', 'PEXPIRETIME', 'PERSIST'],
                example: 'EXPIRE session:abc 1800    # 30分钟\nTTL user:token              # 查看剩余时间\nEXPIREAT cache:daily 1735689600  # Unix时间戳',
                scenario: '会话管理、临时缓存、自动清理、限时优惠等。'
            },
            // 多Key - 集合运算
            'set-ops': {
                title: '集合运算',
                color: '#9b59b6',
                description: 'Set之间的交集、并集、差集运算。这些操作涉及多个Set Key。',
                commands: ['SINTER', 'SUNION', 'SDIFF', 'SINTERSTORE', 'SUNIONSTORE', 'SDIFFSTORE', 'SINTERCARD', 'ZINTER', 'ZUNION', 'ZDIFF', 'ZINTERSTORE', 'ZUNIONSTORE', 'ZDIFFSTORE'],
                example: 'SINTER tags:python tags:redis\nSDIFF tags:following tags:blocked\nSUNION page:1:visits page:2:visits\nZUNIONSTORE total:score 2 z1 z2 WEIGHTS 1 2',
                scenario: '共同好友、共同标签、访问统计合并、聚合排行榜等。'
            },
            // 多Key - 事务
            'transaction': {
                title: '事务',
                color: '#9b59b6',
                description: 'Redis事务允许批量执行命令，保证原子性。支持乐观锁（WATCH）和回滚（DISCARD）。',
                commands: ['MULTI', 'EXEC', 'DISCARD', 'WATCH', 'UNWATCH'],
                example: 'MULTI\nINCR order:count\nHSET order:1001 status "paid"\nLPUSH order:queue "1001"\nEXEC',
                scenario: '订单处理、批量更新、抢购扣库存、账户转账等。'
            },
            // 多Key - 发布订阅
            'pubsub': {
                title: '发布订阅',
                color: '#9b59b6',
                description: '发布订阅模式实现消息广播。Publisher发布消息，Subscriber订阅接收。',
                commands: ['PUBLISH', 'SUBSCRIBE', 'UNSUBSCRIBE', 'PSUBSCRIBE', 'PUNSUBSCRIBE', 'PUBSUB CHANNELS', 'PUBSUB NUMSUB', 'PUBSUB SHARDCHANNELS', 'PSUBSCRIBE'],
                example: 'PUBLISH news:tech "新文章发布"\nSUBSCRIBE news:tech\nPSUBSCRIBE news:*',
                scenario: '实时通知、聊天消息、广播系统、事件驱动架构等。'
            },
            // 多Key - Pipeline
            'pipeline': {
                title: 'Pipeline 管道',
                color: '#9b59b6',
                description: 'Pipeline允许客户端将多个命令打包发送，减少网络往返次数，显著提升性能。',
                commands: ['PIPELINE（客户端特性）', 'CLIENT CACHING', 'GEOADD', 'GEOPOS', 'GEODIST', 'GEORADIUS', 'GEOSEARCH', 'GEOSEARCHSTORE'],
                example: '# 客户端实现\npipe = redis.pipeline()\npipe.incr("page:1:views")\npipe.incr("page:2:views")\npipe.get("total:views")\npipe.execute()',
                scenario: '批量写入、批量读取、统计聚合、批量导入等。'
            },
            // 多Key - Lua脚本
            'scripting': {
                title: 'Lua 脚本',
                color: '#9b59b6',
                description: '通过EVAL/EVALSHA执行Lua脚本，保证原子性。适合复杂的多Key操作。',
                commands: ['EVAL', 'EVALSHA', 'EVAL_RO', 'EVALSHA_RO', 'SCRIPT LOAD', 'SCRIPT EXISTS', 'SCRIPT FLUSH', 'SCRIPT KILL', 'FCALL', 'FCALL_RO'],
                example: 'EVAL "return redis.call(\'GET\', KEYS[1])" 1 mykey\nEVAL "local cnt=redis.call(\'INCR\',KEYS[1]) if cnt==1 then redis.call(\'EXPIRE\',KEYS[1],ARGV[1]) end return cnt" 1 counter 60',
                scenario: '分布式锁、限流器、原子性多Key操作、自定义业务逻辑等。'
            },
            // 多Key - 排序
            'sort': {
                title: '排序',
                color: '#9b59b6',
                description: 'SORT命令对List、Set、ZSet进行排序，支持自定义规则。',
                commands: ['SORT', 'SORT_RO'],
                example: 'SORT user:ids ALPHA DESC\nSORT product:ids BY product:*->price LIMIT 0 10 GET product:*->name GET product:*->price',
                scenario: '排行榜排序、多维度排序、分页排序等。'
            },
            // 多Key - Bitmap
            'bitmap': {
                title: 'Bitmap',
                color: '#9b59b6',
                description: 'Bitmap使用比特位存储数据，适合大规模状态统计。可跨多个Key进行运算。',
                commands: ['SETBIT', 'GETBIT', 'BITCOUNT', 'BITOP', 'BITPOS', 'BITFIELD', 'BITFIELD_RO', 'GETBIT'],
                example: 'SETBIT user:online:2024 10086 1\nBITCOUNT user:online:2024\nBITOP AND online:total user:online:d1 user:online:d2',
                scenario: '用户在线状态、日活统计、签到系统、特征标记等。'
            },
            // 多Key - HyperLogLog
            'hyperloglog': {
                title: 'HyperLogLog',
                color: '#9b59b6',
                description: 'HyperLogLog是概率算法，用极小空间做基数统计（UV）。需要合并多个Key的结果。',
                commands: ['PFADD', 'PFCOUNT', 'PFMERGE'],
                example: 'PFADD uv:2024:01:01 user1 user2 user3\nPFADD uv:2024:01:02 user2 user3 user4\nPFCOUNT uv:2024:01:01 uv:2024:01:02',
                scenario: '日活(DAU)统计、独立访客数、UV统计等。'
            },
            // 多Key - Stream
            'stream': {
                title: 'Stream',
                color: '#9b59b6',
                description: 'Stream是Redis 5.0引入的持久化消息流，支持消费组、ID排序、范围查询等高级特性。',
                commands: ['XADD', 'XRANGE', 'XREVRANGE', 'XLEN', 'XREAD', 'XREADGROUP', 'XACK', 'XGROUP', 'XINFO', 'XDEL', 'XTRIM', 'XCLAIM', 'XAUTOCLAIM'],
                example: 'XADD stream:orders * user "Alice" amount 100\nXRANGE stream:orders - + COUNT 10\nXREADGROUP GROUP g1 c1 STREAMS stream:orders ">"',
                scenario: '消息队列、事件溯源、日志收集、延迟任务、实时数据流处理等。'
            },
            // 多Key - GEO
            'geo': {
                title: 'GEO 地理位置',
                color: '#9b59b6',
                description: 'GEO命令存储和查询地理位置信息，基于经纬度计算距离和范围。',
                commands: ['GEOADD', 'GEOPOS', 'GEODIST', 'GEORADIUS', 'GEORADIUSBYMEMBER', 'GEOSEARCH', 'GEOSEARCHSTORE', 'GEOHASH'],
                example: 'GEOADD stores:china 116.4 39.9 "store:bj"\nGEORADIUS stores:china 116.4 39.9 10 km\nGEOSEARCH FROMLONLAT 116.4 39.9 BYRADIUS 10 km',
                scenario: '附近的人/商铺、LBS应用、配送范围、地理围栏等。'
            },
            // 单一Key - Bitmap
            'bitmap-single': {
                title: 'Bitmap 单Key操作',
                color: '#3498db',
                description: 'Bitmap在单个Key内的位操作。适合在单个用户或单个维度上做标记。',
                commands: ['SETBIT', 'GETBIT', 'BITCOUNT', 'BITPOS', 'BITFIELD'],
                example: 'SETBIT user:1001:sign:2024 15 1  # 3月16日签到\nGETBIT user:1001:sign:2024 15   # 检查是否签到\nBITCOUNT user:1001:sign:2024    # 统计签到天数',
                scenario: '单用户签到、单个用户的行为标记、简单状态位等。'
            },
            // 单一Key - HyperLogLog
            'hyperloglog-single': {
                title: 'HyperLogLog 单Key操作',
                color: '#3498db',
                description: 'PFADD在单个Key中添加元素，PFCOUNT查询单个Key的基数估计值。',
                commands: ['PFADD', 'PFCOUNT'],
                example: 'PFADD uv:page:home user1 user2 user3\nPFADD uv:page:product user2 user3 user4\nPFCOUNT uv:page:home',
                scenario: '单页面UV统计、单个接口访问量等。'
            }
        };

        // 创建流程图
        function createFlowchart() {
            const svg = d3.select('#flowchart');
            const width = 1400;
            const height = 750;

            svg.attr('width', width).attr('height', height);

            // 定义渐变和箭头
            const defs = svg.append('defs');

            defs.append('marker')
                .attr('id', 'arrowhead')
                .attr('viewBox', '-0 -5 10 10')
                .attr('refX', 8)
                .attr('refY', 0)
                .attr('orient', 'auto')
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .append('path')
                .attr('d', 'M 0,-4 L 8,0 L 0,4')
                .attr('fill', '#666');

            // 节点尺寸
            const nodeWidth = 130;
            const nodeHeight = 45;

            // 定义节点位置
            const nodePositions = {
                // 顶层
                'root': { x: width / 2 - nodeWidth / 2, y: 20 },

                // 第二层 - 两大分类
                'single': { x: 150, y: 130 },
                'multi': { x: 700, y: 130 },

                // 第三层 - 单一Key各数据类型
                'string-read': { x: 20, y: 280 },
                'string-write': { x: 180, y: 280 },
                'hash-read': { x: 20, y: 380 },
                'hash-write': { x: 180, y: 380 },
                'list-read': { x: 20, y: 480 },
                'list-write': { x: 180, y: 480 },
                'set-read': { x: 20, y: 580 },
                'set-write': { x: 180, y: 580 },
                'zset-read': { x: 20, y: 680 },
                'zset-write': { x: 180, y: 680 },
                'bitmap-single': { x: 340, y: 280 },
                'hyperloglog-single': { x: 340, y: 380 },

                // 第三层 - 多Key各类型
                'key-manage': { x: 720, y: 280 },
                'key-ttl': { x: 870, y: 280 },
                'set-ops': { x: 1020, y: 280 },
                'transaction': { x: 720, y: 380 },
                'pubsub': { x: 870, y: 380 },
                'pipeline': { x: 1020, y: 380 },
                'scripting': { x: 720, y: 480 },
                'sort': { x: 870, y: 480 },
                'bitmap': { x: 1020, y: 480 },
                'hyperloglog': { x: 720, y: 580 },
                'stream': { x: 870, y: 580 },
                'geo': { x: 1020, y: 580 }
            };

            // 定义连接关系
            const links = [
                // 根到两大分类
                { source: 'root', target: 'single', label: '单Key' },
                { source: 'root', target: 'multi', label: '多Key' },

                // 单一Key分类
                { source: 'single', target: 'string-read', label: '' },
                { source: 'single', target: 'string-write', label: '' },
                { source: 'single', target: 'hash-read', label: '' },
                { source: 'single', target: 'hash-write', label: '' },
                { source: 'single', target: 'list-read', label: '' },
                { source: 'single', target: 'list-write', label: '' },
                { source: 'single', target: 'set-read', label: '' },
                { source: 'single', target: 'set-write', label: '' },
                { source: 'single', target: 'zset-read', label: '' },
                { source: 'single', target: 'zset-write', label: '' },
                { source: 'single', target: 'bitmap-single', label: '' },
                { source: 'single', target: 'hyperloglog-single', label: '' },

                // 多Key分类
                { source: 'multi', target: 'key-manage', label: '' },
                { source: 'multi', target: 'key-ttl', label: '' },
                { source: 'multi', target: 'set-ops', label: '' },
                { source: 'multi', target: 'transaction', label: '' },
                { source: 'multi', target: 'pubsub', label: '' },
                { source: 'multi', target: 'pipeline', label: '' },
                { source: 'multi', target: 'scripting', label: '' },
                { source: 'multi', target: 'sort', label: '' },
                { source: 'multi', target: 'bitmap', label: '' },
                { source: 'multi', target: 'hyperloglog', label: '' },
                { source: 'multi', target: 'stream', label: '' },
                { source: 'multi', target: 'geo', label: '' }
            ];

            // 绘制连接线
            const linkGroup = svg.append('g').attr('class', 'links');

            links.forEach((link, i) => {
                const source = nodePositions[link.source];
                const target = nodePositions[link.target];

                let path;
                if (link.label) {
                    // 分支标签线
                    const midY = (source.y + nodeHeight + target.y) / 2;
                    path = `M ${source.x + nodeWidth / 2} ${source.y + nodeHeight} 
                            L ${source.x + nodeWidth / 2} ${midY} 
                            L ${target.x + nodeWidth / 2} ${midY} 
                            L ${target.x + nodeWidth / 2} ${target.y}`;
                } else {
                    path = `M ${source.x + nodeWidth / 2} ${source.y + nodeHeight} 
                            L ${target.x + nodeWidth / 2} ${target.y}`;
                }

                linkGroup.append('path')
                    .attr('class', 'link')
                    .attr('d', path)
                    .attr('stroke', '#555')
                    .attr('marker-end', 'url(#arrowhead)');

                // 添加分支标签
                if (link.label) {
                    const labelX = (source.x + target.x + nodeWidth) / 2;
                    const labelY = (source.y + nodeHeight + target.y) / 2 - 10;

                    linkGroup.append('rect')
                        .attr('x', labelX - 25)
                        .attr('y', labelY - 8)
                        .attr('width', 50)
                        .attr('height', 18)
                        .attr('fill', '#1a1a2e')
                        .attr('rx', 3);

                    linkGroup.append('text')
                        .attr('class', 'link-label')
                        .attr('x', labelX)
                        .attr('y', labelY + 4)
                        .attr('text-anchor', 'middle')
                        .text(link.label);
                }
            });

            // 添加分组标签
            const groupLabels = [
                { x: 100, y: 240, text: '📊 String/Hash/List/Set/ZSet/Bitmap/HyperLogLog' },
                { x: 870, y: 240, text: '🔗 Key管理 · 集合运算 · 事务 · 脚本 · 消息流 · 地理' }
            ];

            groupLabels.forEach(label => {
                svg.append('text')
                    .attr('class', 'group-label')
                    .attr('x', label.x)
                    .attr('y', label.y)
                    .attr('text-anchor', 'middle')
                    .text(label.text);
            });

            // 绘制节点
            const nodeGroup = svg.append('g').attr('class', 'nodes');

            Object.entries(nodePositions).forEach(([id, pos]) => {
                const data = commandData[id];
                if (!data) return;

                const group = nodeGroup.append('g')
                    .attr('class', 'node')
                    .attr('transform', `translate(${pos.x}, ${pos.y})`)
                    .on('click', () => showDetail(id))
                    .on('mouseenter', function () {
                        d3.select(this).select('rect')
                            .transition()
                            .duration(200)
                            .attr('filter', 'brightness(1.3)');
                        // 找到连接线并高亮
                        d3.selectAll('.link').filter(function (d) {
                            return d && (d.source === id || d.target === id);
                        })
                            .transition()
                            .duration(200)
                            .attr('stroke', '#ff9f43')
                            .attr('stroke-width', 3);
                    })
                    .on('mouseleave', function () {
                        d3.select(this).select('rect')
                            .transition()
                            .duration(200)
                            .attr('filter', 'none');
                        d3.selectAll('.link')
                            .transition()
                            .duration(200)
                            .attr('stroke', '#555')
                            .attr('stroke-width', 2);
                    });

                // 圆角矩形
                group.append('rect')
                    .attr('width', nodeWidth)
                    .attr('height', nodeHeight)
                    .attr('rx', 6)
                    .attr('ry', 6)
                    .attr('fill', data.color)
                    .attr('stroke', '#fff')
                    .attr('stroke-width', 1)
                    .attr('stroke-opacity', 0.3);

                // 标题
                group.append('text')
                    .attr('x', nodeWidth / 2)
                    .attr('y', nodeHeight / 2 - 2)
                    .attr('text-anchor', 'middle')
                    .attr('dominant-baseline', 'middle')
                    .attr('fill', '#fff')
                    .attr('font-weight', 'bold')
                    .attr('font-size', '11px')
                    .text(data.title);

                // 副标题（命令数量）
                const cmdCount = data.commands ? data.commands.length : (id === 'root' ? '核心分类' : '');
                group.append('text')
                    .attr('x', nodeWidth / 2)
                    .attr('y', nodeHeight / 2 + 14)
                    .attr('text-anchor', 'middle')
                    .attr('fill', 'rgba(255,255,255,0.7)')
                    .attr('font-size', '9px')
                    .text(cmdCount);
            });
        }

        // 显示详情
        function showDetail(id) {
            const data = commandData[id];
            if (!data) return;

            const card = document.getElementById('detailCard');

            let html = `
                <h2>
                    <span style="display:inline-block;width:12px;height:12px;background:${data.color};border-radius:3px;margin-right:8px;"></span>
                    ${data.title}
                </h2>
                <p class="description">${data.description}</p>
            `;

            if (data.commands) {
                html += `
                    <div class="cmd-list">
                        ${data.commands.map(cmd => `<span class="cmd-tag">${cmd}</span>`).join('')}
                    </div>
                `;
            }

            if (data.example) {
                html += `<div class="example">${data.example.replace(/\n/g, '<br>')}</div>`;
            }

            if (data.scenario) {
                html += `
                    <div class="scenario">
                        <h4>💡 典型场景</h4>
                        <p>${data.scenario}</p>
                    </div>
                `;
            }

            // 添加子类型标签
            const typeLabels = {
                'single': '🔹 单一Key命令',
                'multi': '🔸 多Key命令',
                'root': ''
            };
            if (data.subType && typeLabels[data.subType]) {
                html = `<p style="color:#888;font-size:0.85em;margin-bottom:10px;">${typeLabels[data.subType]}</p>` + html;
            }

            card.innerHTML = html;
        }

        // 初始化
        window.addEventListener('load', () => {
            createFlowchart();
            showDetail('root');
        });
    </script>
</body>
</html>
