<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Python 多线程工作原理 — 动态演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --cyan: #58a6ff;
    --orange: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --pink: #f778ba;
    --yellow: #e3b341;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 14px;
    line-height: 1.6;
    padding: 24px;
  }
  .page { max-width: 1200px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-family: -apple-system, 'PingFang SC', sans-serif;
    font-size: 26px; font-weight: 700;
    background: linear-gradient(90deg, var(--cyan), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header p { color: var(--text-dim); font-size: 13px; margin-top: 6px; font-family: sans-serif; }

  /* Layout */
  .main { display: flex; gap: 20px; align-items: flex-start; }

  /* Code panel */
  .code-panel {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .code-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px;
    background: #1c2128;
    border-bottom: 1px solid var(--border);
    font-family: sans-serif;
    font-size: 13px;
    color: var(--text-dim);
  }
  .code-header .dots { display: flex; gap: 6px; }
  .code-header .dot { width: 12px; height: 12px; border-radius: 50%; }
  .code-header .dot.r { background: #ff5f57; }
  .code-header .dot.y { background: #febc2e; }
  .code-header .dot.g { background: #28c840; }

  .code-body { padding: 8px 0; position: relative; }

  .code-line {
    display: flex;
    align-items: stretch;
    padding: 1px 0;
    transition: background 0.3s;
    position: relative;
    min-height: 24px;
  }
  .code-line.active { background: rgba(88,166,255,0.08); }
  .code-line.active .line-num { color: var(--cyan); }
  .code-line.active::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--cyan);
    border-radius: 0 2px 2px 0;
  }
  .code-line.done { background: rgba(63,185,80,0.04); }
  .code-line.done .line-num { color: var(--green); opacity: 0.5; }

  .line-num {
    width: 48px; min-width: 48px;
    text-align: right; padding-right: 16px;
    color: var(--text-dim); opacity: 0.4;
    user-select: none; font-size: 12px;
    line-height: 24px;
    transition: all 0.3s;
  }
  .line-content {
    flex: 1; white-space: pre; padding-right: 16px;
    line-height: 24px;
  }

  /* Syntax colors */
  .kw { color: #ff7b72; }      /* keyword */
  .fn { color: #d2a8ff; }      /* function */
  .st { color: #a5d6ff; }      /* string */
  .cm { color: #8b949e; font-style: italic; }  /* comment */
  .nb { color: #79c0ff; }      /* built-in */
  .nu { color: #e3b341; }      /* number */
  .op { color: #ff7b72; }      /* operator */
  .dc { color: #ffa657; }      /* decorator */

  /* Explain panel */
  .explain-panel {
    width: 380px; min-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: sticky; top: 24px;
  }
  .explain-header {
    padding: 12px 16px;
    background: #1c2128;
    border-bottom: 1px solid var(--border);
    font-family: sans-serif;
    font-size: 14px; font-weight: 600;
    color: var(--cyan);
    display: flex; align-items: center; gap: 8px;
  }
  .explain-header .icon { font-size: 16px; }
  .explain-body { padding: 20px; min-height: 400px; }

  .step-label {
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 8px;
    font-family: sans-serif;
  }
  .step-title {
    font-size: 18px; font-weight: 700;
    margin-bottom: 12px;
    font-family: -apple-system, 'PingFang SC', sans-serif;
  }
  .step-desc {
    font-size: 13px; color: var(--text-dim);
    line-height: 1.8;
    font-family: -apple-system, 'PingFang SC', sans-serif;
    margin-bottom: 16px;
  }
  .step-desc strong { color: var(--text); font-weight: 600; }

  .thread-visual {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 8px;
  }
  .thread-label {
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 8px; font-family: sans-serif;
  }
  .thread-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; font-size: 12px;
  }
  .thread-name {
    width: 70px; font-weight: 600;
    font-family: sans-serif;
  }
  .thread-bar {
    height: 22px; border-radius: 4px;
    display: flex; align-items: center;
    padding: 0 8px; font-size: 11px;
    transition: all 0.5s ease;
    font-family: sans-serif;
    color: white;
  }
  .thread-bar.idle { background: #21262d; color: var(--text-dim); }
  .thread-bar.running { background: var(--green); color: #0d1117; }
  .thread-bar.blocked { background: var(--orange); }
  .thread-bar.waiting { background: var(--purple); }
  .thread-bar.gil { 
    background: repeating-linear-gradient(
      45deg, var(--red), var(--red) 4px, #b62324 4px, #b62324 8px
    ); color: white;
  }

  .timeline-bar {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 12px;
  }
  .timeline-title {
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 10px; font-family: sans-serif;
  }
  .timeline {
    display: flex; gap: 2px; height: 32px;
    border-radius: 4px; overflow: hidden;
  }
  .timeline-cell {
    flex: 1; display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: white; font-family: sans-serif;
    transition: all 0.3s;
    opacity: 0.2;
    border-radius: 2px;
  }
  .timeline-cell.lit { opacity: 1; }

  .note-box {
    background: rgba(88,166,255,0.08);
    border-left: 3px solid var(--cyan);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    margin-top: 12px;
    font-size: 12px; color: var(--cyan);
    font-family: -apple-system, 'PingFang SC', sans-serif;
    line-height: 1.6;
  }
  .note-box.warn {
    background: rgba(248,81,73,0.08);
    border-left-color: var(--red);
    color: var(--red);
  }

  /* Controls */
  .controls {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin-top: 24px;
  }
  .btn {
    padding: 10px 24px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--surface);
    color: var(--text); cursor: pointer;
    font-size: 14px; font-family: sans-serif;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: #1c2128; border-color: var(--cyan); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--cyan); color: #0d1117;
    border-color: var(--cyan); font-weight: 600;
  }
  .btn.primary:hover { background: #79c0ff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .progress {
    width: 200px; height: 4px;
    background: var(--border); border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--cyan);
    border-radius: 2px; transition: width 0.3s;
  }

  .speed-control {
    display: flex; align-items: center; gap: 8px;
    font-family: sans-serif; font-size: 12px; color: var(--text-dim);
  }
  .speed-control input[type="range"] {
    width: 80px; accent-color: var(--cyan);
  }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>Python 多线程底层工作原理 — 逐行动态演示</h1>
    <p>通过一个真实的多线程下载示例，逐行展示 GIL、线程切换、OS 调度、线程同步的底层过程</p>
  </div>

  <div class="main">
    <!-- Code Panel -->
    <div class="code-panel">
      <div class="code-header">
        <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
        <span>multithread_demo.py</span>
      </div>
      <div class="code-body" id="codeBody"></div>
    </div>

    <!-- Explain Panel -->
    <div class="explain-panel">
      <div class="explain-header">
        <span class="icon">📖</span> 当前行解析
      </div>
      <div class="explain-body" id="explainBody">
        <div class="step-label">准备就绪</div>
        <div class="step-title">点击下方按钮开始演示</div>
        <div class="step-desc">
          我们将通过一个<strong>多线程下载</strong>的例子，逐行展示 Python 多线程的底层工作原理。<br><br>
          你将看到：<br>
          • 线程是如何创建的<br>
          • GIL（全局解释器锁）如何控制执行<br>
          • OS 如何在线程间调度切换<br>
          • 线程间如何共享数据与同步
        </div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn" id="btnPrev" disabled>◀ 上一步</button>
    <button class="btn primary" id="btnNext">下一步 ▶</button>
    <button class="btn" id="btnAuto">▶ 自动播放</button>
    <div class="speed-control">
      <span>速度</span>
      <input type="range" id="speedRange" min="1" max="5" value="3">
      <span id="speedLabel">1.5s</span>
    </div>
    <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
    <span id="stepCounter" style="color:var(--text-dim);font-size:12px;font-family:sans-serif">0 / 28</span>
  </div>
</div>

<script>
// ============ Code lines data ============
const codeLines = [
  { code: `<span class="cm"># Python 多线程示例：模拟多线程下载文件</span>`, noExec: true },
  { code: `<span class="cm"># 底层演示：GIL / OS调度 / 线程同步</span>`, noExec: true },
  { code: `` },
  { code: `<span class="kw">import</span> threading` },
  { code: `<span class="kw">import</span> time` },
  { code: `<span class="kw">from</span> concurrent.futures <span class="kw">import</span> ThreadPoolExecutor` },
  { code: `` },
  { code: `<span class="cm"># ─── 共享状态（所有线程都能访问）───</span>`, noExec: true },
  { code: `downloaded <span class="op">=</span> <span class="op">{}</span>  <span class="cm"># 共享字典，存下载结果</span>` },
  { code: `lock <span class="op">=</span> threading.Lock()  <span class="cm"># 互斥锁，保护共享数据</span>` },
  { code: `` },
  { code: `<span class="cm"># ─── 下载函数（每个线程执行的任务）───</span>`, noExec: true },
  { code: `<span class="kw">def</span> <span class="fn">download</span>(file_name, size_mb):` },
  { code: `    <span class="nb">print</span>(<span class="st">f"[</span>{threading.current_thread().name}<span class="st">] 开始下载 {file_name}"</span>)` },
  { code: `    <span class="nb">print</span>(<span class="st">f"[</span>{threading.current_thread().name}<span class="st">] 获取 GIL，开始执行 Python 代码"</span>)` },
  { code: `` },
  { code: `    <span class="cm"># 模拟网络下载（I/O 操作，会释放 GIL）</span>`, noExec: true },
  { code: `    chunks <span class="op">=</span> size_mb <span class="op">*</span> <span class="nu">4</span>  <span class="cm"># 每次下载 0.25MB</span>` },
  { code: `    <span class="kw">for</span> i <span class="kw">in</span> <span class="nb">range</span>(chunks):` },
  { code: `        <span class="nb">print</span>(<span class="st">f"[</span>{threading.current_thread().name}<span class="st">] 释放 GIL → time.sleep() 进入 I/O 等待"</span>)` },
  { code: `        time.sleep(<span class="nu">0.3</span>)  <span class="cm"># ⚡ I/O操作：释放GIL！OS切换到其他线程</span>` },
  { code: `        <span class="nb">print</span>(<span class="st">f"[</span>{threading.current_thread().name}<span class="st">] I/O完成 → 重新获取 GIL 继续执行"</span>)` },
  { code: `` },
  { code: `    <span class="cm"># 下载完成，写入共享数据（需要加锁）</span>`, noExec: true },
  { code: `    <span class="kw">with</span> lock:  <span class="cm"># 获取互斥锁，同一时刻只有一个线程能执行这里</span>` },
  { code: `        downloaded[file_name] <span class="op">=</span> <span class="st">f"已下载 {size_mb}MB"</span>` },
  { code: `        <span class="nb">print</span>(<span class="st">f"[</span>{threading.current_thread().name}<span class="st">] 安全写入共享数据 ✓"</span>)` },
  { code: `` },
  { code: `<span class="cm"># ─── 启动多线程 ───</span>`, noExec: true },
  { code: `<span class="kw">if</span> __name__ <span class="op">==</span> <span class="st">"__main__"</span>:` },
  { code: `    files <span class="op">=</span> [(<span class="st">"报告.pdf"</span>, <span class="nu">2</span>), (<span class="st">"照片.zip"</span>, <span class="nu">1</span>), (<span class="st">"视频.mp4"</span>, <span class="nu">3</span>)]` },
  { code: `` },
  { code: `    <span class="cm"># 方式1：手动创建线程</span>`, noExec: true },
  { code: `    threads <span class="op">=</span> []` },
  { code: `    <span class="kw">for</span> name, size <span class="kw">in</span> files:` },
  { code: `        t <span class="op">=</span> threading.Thread(target<span class="op">=</span>download, args<span class="op">=</span>(name, size))` },
  { code: `        threads.append(t)` },
  { code: `        t.start()  <span class="cm"># ⚡ 创建 OS 线程，加入 OS 调度队列</span>` },
  { code: `` },
  { code: `    <span class="cm"># 主线程等待所有子线程完成</span>`, noExec: true },
  { code: `    <span class="kw">for</span> t <span class="kw">in</span> threads:` },
  { code: `        t.join()  <span class="cm"># 主线程阻塞等待，直到子线程结束</span>` },
  { code: `` },
  { code: `    <span class="nb">print</span>(<span class="st">"所有下载完成！"</span>, downloaded)` },
];

// ============ Step explanations ============
const steps = [
  // line 0: import threading
  {
    title: '导入 threading 模块',
    desc: `<strong>import threading</strong> 导入 Python 内置的线程模块。<br><br>
Python 的线程是对操作系统原生线程的封装（<strong>1:1 模型</strong>）。每个 threading.Thread 对象背后都是一个真实的 OS 线程（pthread on Linux, Thread on Windows）。<br><br>
这意味着线程的创建、切换、调度都由<strong>操作系统内核</strong>负责，不是 Python 自己做的。`,
    threads: [
      { name: 'Main', status: 'running', text: '执行 import' }
    ],
    timeline: ['T0'],
    note: 'Python 的线程 = OS 原生线程的包装，不是"绿色线程"'
  },
  // line 1: import time
  {
    title: '导入 time 模块',
    desc: `<strong>import time</strong> 提供时间相关函数。<br><br>
其中 <strong>time.sleep()</strong> 特别重要——它是<strong>I/O 操作</strong>，执行时会<strong>释放 GIL</strong>，让其他线程有机会执行。`,
    threads: [
      { name: 'Main', status: 'running', text: '执行 import' }
    ],
    timeline: ['T0', 'T0'],
    note: null
  },
  // line 2: from concurrent.futures...
  {
    title: '导入 ThreadPoolExecutor',
    desc: `<strong>ThreadPoolExecutor</strong> 是 Python 3.2+ 提供的<strong>线程池</strong>，是更高级的线程管理方式。<br><br>
线程池的优势：<br>
• 避免频繁创建/销毁线程的开销<br>
• 控制最大并发线程数<br>
• 用 <strong>submit()</strong> 提交任务，用 <strong>Future</strong> 获取结果<br><br>
本例中我们先用手动方式创建线程来理解原理。`,
    threads: [
      { name: 'Main', status: 'running', text: '执行 import' }
    ],
    timeline: ['T0', 'T0', 'T0'],
    note: null
  },
  // line 4: downloaded = {}
  {
    title: '创建共享字典',
    desc: `<strong>downloaded = {}</strong> 创建一个字典对象，存储在堆内存中。<br><br>
这个字典被所有线程<strong>共享访问</strong>。在 Python 中，线程共享同一个进程的内存空间。<br><br>
<span style="color:var(--red)">⚠️ 这正是多线程危险的根源！</span><br>多个线程同时读写同一个字典，可能导致数据竞争（Race Condition）。`,
    threads: [
      { name: 'Main', status: 'running', text: '创建共享数据' }
    ],
    timeline: ['T0', 'T0', 'T0', 'T0'],
    note: null
  },
  // line 5: lock = threading.Lock()
  {
    title: '创建互斥锁（Mutex Lock）',
    desc: `<strong>threading.Lock()</strong> 创建一个互斥锁对象。<br><br>
互斥锁的作用：<br>
• <strong>acquire()</strong>：尝试获取锁，如果锁已被占用则阻塞等待<br>
• <strong>release()</strong>：释放锁，唤醒等待的线程<br><br>
在写入共享数据前<strong>必须先获取锁</strong>，确保同一时刻只有一个线程在修改。<br><br>
<span style="color:var(--orange)">底层原理：</span>Lock 内部使用 OS 的 mutex 原语（如 pthread_mutex），涉及内核态的系统调用。`,
    threads: [
      { name: 'Main', status: 'running', text: '创建 Lock' }
    ],
    timeline: ['T0', 'T0', 'T0', 'T0', 'T0'],
    note: '锁的获取/释放涉及系统调用（内核态↔用户态切换），有性能开销'
  },
  // line 7: def download(file_name, size_mb):
  {
    title: '定义下载函数',
    desc: `<strong>def download()</strong> 定义了每个线程要执行的任务函数。<br><br>
这里只是<strong>定义</strong>函数，还没有执行。函数对象在内存中只有一份，但每个线程会各自拥有独立的<strong>调用栈</strong>（局部变量 file_name、size_mb、i 等互不影响）。<br><br>
<span style="color:var(--green)">✅ 线程安全提示：</span>函数内的局部变量是线程安全的（各自有栈帧），只有共享的全局变量/对象才需要加锁。`,
    threads: [
      { name: 'Main', status: 'running', text: '定义函数' }
    ],
    timeline: ['T0', 'T0', 'T0', 'T0', 'T0', 'T0'],
    note: null
  },
  // line 8: print (start download)
  {
    title: '线程启动 — 打印开始信息',
    desc: `当线程开始执行，第一件事是打印日志。<br><br>
<strong>threading.current_thread().name</strong> 返回当前线程名称。<br>默认命名规则：<strong>Thread-N</strong>（N从1开始）。<br><br>
<span style="color:var(--cyan)">⚡ 此刻发生了什么？</span><br>① 子线程刚被 OS 唤醒<br>② 子线程<strong>竞争 GIL</strong>（全局解释器锁）<br>③ 获取到 GIL 后，才能执行这行 Python 代码<br><br>
注意：3个子线程可能几乎同时启动，但<strong>同一时刻只有1个能持有 GIL</strong>。`,
    threads: [
      { name: 'Main', status: 'gil', text: '等待 join()' },
      { name: 'Thread-1', status: 'running', text: '获取GIL ✓' },
      { name: 'Thread-2', status: 'blocked', text: '等待 GIL...' },
      { name: 'Thread-3', status: 'blocked', text: '等待 GIL...' }
    ],
    timeline: ['T0', 'T0', 'T0', 'T0', 'T0', 'T0', 'T1'],
    note: 'GIL 是 CPython 的互斥锁，确保同一时刻只有一个线程执行 Python 字节码'
  },
  // line 9: print (GIL acquired)
  {
    title: 'GIL 竞争详解',
    desc: `这行打印帮助理解 <strong>GIL 的竞争过程</strong>。<br><br><span style="color:var(--cyan)">GIL 获取流程：</span><br>

    div.className = 'code-line';
    div.id = 'line-' + i;
    div.innerHTML = `<span class="line-num">${i + 1}</span><span class="line-content">${line.code || '&nbsp;'}</span>`;
    body.appendChild(div);
  });
}

function updateDisplay(stepIdx) {
  // Clear all highlights
  codeLines.forEach((_, i) => {
    const el = document.getElementById('line-' + i);
    el.classList.remove('active', 'done');
  });

  // Determine which lines to highlight
  const currentLines = stepToLines[stepIdx] || [];
  const prevLines = [];
  for (let s = 0; s < stepIdx; s++) {
    stepToLines[s].forEach(l => { if (!prevLines.includes(l)) prevLines.push(l); });
  }

  // Mark previous lines as done
  prevLines.forEach(l => {
    const el = document.getElementById('line-' + l);
    if (el && !currentLines.includes(l)) el.classList.add('done');
  });

  // Mark current lines as active
  currentLines.forEach(l => {
    const el = document.getElementById('line-' + l);
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  // Update explain panel
  const step = steps[stepIdx];
  const explainBody = document.getElementById('explainBody');
  let threadHtml = '';
  step.threads.forEach(t => {
    threadHtml += `
      <div class="thread-row">
        <span class="thread-name" style="color:${t.status==='idle'?'var(--text-dim)':t.name==='Main'?'var(--cyan)':'var(--green)'}">${t.name}</span>
        <div class="thread-bar ${t.status}">${t.text}</div>
      </div>`;
  });

  let timelineHtml = '';
  step.timeline.forEach((cell, i) => {
    const colors = { 'T0': 'var(--cyan)', 'T1': 'var(--green)', 'T2': 'var(--purple)', 'J': 'var(--orange)', '✅': 'var(--green)' };
    timelineHtml += `<div class="timeline-cell ${i <= stepIdx ? 'lit' : ''}" style="background:${colors[cell] || 'var(--cyan)'}">${cell}</div>`;
  });

  let noteHtml = '';
  if (step.note) {
    noteHtml = `<div class="note-box ${step.noteWarn ? 'warn' : ''}">${step.note}</div>`;
  }

  explainBody.innerHTML = `
    <div class="step-label">步骤 ${stepIdx + 1} / ${steps.length}</div>
    <div class="step-title">${step.title}</div>
    <div class="step-desc">${step.desc}</div>
    <div class="thread-visual">
      <div class="thread-label">线程状态</div>
      ${threadHtml}
    </div>
    <div class="timeline-bar">
      <div class="timeline-title">执行时间线（T0=主线程, T1/T2/T3=子线程）</div>
      <div class="timeline">${timelineHtml}</div>
    </div>
    ${noteHtml}
  `;

  // Update progress
  const progress = ((stepIdx + 1) / steps.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('stepCounter').textContent = `${stepIdx + 1} / ${steps.length}`;

  // Update buttons
  document.getElementById('btnPrev').disabled = stepIdx <= 0;
  document.getElementById('btnNext').disabled = stepIdx >= steps.length - 1;
}

function nextStep() {
  if (currentStep < steps.length - 1) {
    currentStep++;
    updateDisplay(currentStep);
  } else {
    stopAuto();
  }
}

function prevStep() {
  if (currentStep > 0) {
    currentStep--;
    updateDisplay(currentStep);
  }
}

function getSpeed() {
  const v = document.getElementById('speedRange').value;
  return [3000, 2000, 1500, 1000, 500][v - 1];
}

function startAuto() {
  if (currentStep >= steps.length - 1) {
    currentStep = -1;
    updateDisplay(0);
  }
  document.getElementById('btnAuto').textContent = '⏸ 暂停';
  autoTimer = setInterval(() => {
    if (currentStep < steps.length - 1) {
      nextStep();
    } else {
      stopAuto();
    }
  }, getSpeed());
}

function stopAuto() {
  if (autoTimer) {
    clearInterval(autoTimer);
    autoTimer = null;
  }
  document.getElementById('btnAuto').textContent = '▶ 自动播放';
}

// Speed label
document.getElementById('speedRange').addEventListener('input', () => {
  const v = document.getElementById('speedRange').value;
  const labels = ['3.0s', '2.0s', '1.5s', '1.0s', '0.5s'];
  document.getElementById('speedLabel').textContent = labels[v - 1];
  if (autoTimer) { stopAuto(); startAuto(); }
});

// Button bindings
document.getElementById('btnNext').addEventListener('click', nextStep);
document.getElementById('btnPrev').addEventListener('click', prevStep);
document.getElementById('btnAuto').addEventListener('click', () => {
  if (autoTimer) stopAuto(); else startAuto();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextStep(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevStep(); }
});

// Init
renderCode();
updateDisplay(0);
currentStep = 0;
</script>
</body>
</html>
