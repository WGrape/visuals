<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPU 指令周期 · 交互式可视化</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2234;
  --text:#e2e8f0;--muted:#64748b;
  --fetch:#f59e0b;--decode:#3b82f6;--execute:#10b981;--memory:#a855f7;--writeback:#ef4444;
  --fetch-dim:#78500a;--decode-dim:#1a3a6e;--execute-dim:#0a5e3a;--memory-dim:#4a2270;--writeback-dim:#6e1a1a;
  --glow:0 0 20px rgba(245,158,11,0.3);
}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 10px}

.header{text-align:center;margin-bottom:30px}
.header h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--fetch),var(--execute));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:var(--muted);font-size:.95rem}

/* ===== Pipeline Overview ===== */
.pipeline{display:flex;align-items:center;gap:4px;margin-bottom:40px;flex-wrap:wrap;justify-content:center}
.pipe-stage{
  position:relative;width:140px;padding:16px 10px;border-radius:12px;
  background:var(--bg2);border:2px solid #1e293b;cursor:pointer;
  transition:all .4s cubic-bezier(.4,0,.2,1);text-align:center;flex-shrink:0;
}
.pipe-stage:hover{transform:translateY(-3px)}
.pipe-stage.active{transform:translateY(-5px);z-index:2}
.pipe-stage.s-fetch.active{border-color:var(--fetch);box-shadow:0 0 30px rgba(245,158,11,.35)}
.pipe-stage.s-decode.active{border-color:var(--decode);box-shadow:0 0 30px rgba(59,130,246,.35)}
.pipe-stage.s-execute.active{border-color:var(--execute);box-shadow:0 0 30px rgba(16,185,129,.35)}
.pipe-stage.s-memory.active{border-color:var(--memory);box-shadow:0 0 30px rgba(168,85,247,.35)}
.pipe-stage.s-writeback.active{border-color:var(--writeback);box-shadow:0 0 30px rgba(239,68,68,.35)}
.pipe-num{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:20px;height:20px;border-radius:50%;background:var(--bg);border:2px solid #334155;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.pipe-stage.active .pipe-num{border-color:currentColor}
.s-fetch.active .pipe-num{color:var(--fetch);border-color:var(--fetch)}
.s-decode.active .pipe-num{color:var(--decode);border-color:var(--decode)}
.s-execute.active .pipe-num{color:var(--execute);border-color:var(--execute)}
.s-memory.active .pipe-num{color:var(--memory);border-color:var(--memory)}
.s-writeback.active .pipe-num{color:var(--writeback);border-color:var(--writeback)}
.pipe-icon{font-size:28px;margin-bottom:6px}
.pipe-label{font-size:14px;font-weight:700}
.pipe-sub{font-size:11px;color:var(--muted);margin-top:2px}
.pipe-arrow{color:#334155;font-size:18px;flex-shrink:0;transition:color .3s}
.pipe-arrow.lit{color:var(--fetch)}

/* ===== Detail Panel ===== */
.detail-panel{
  width:100%;max-width:1100px;min-height:420px;background:var(--bg2);
  border:1px solid #1e293b;border-radius:16px;overflow:hidden;
  margin-bottom:30px;position:relative;
}
.detail-inner{padding:30px;display:flex;gap:30px;height:100%;opacity:0;transform:translateY(12px);transition:all .4s ease}
.detail-inner.visible{opacity:1;transform:translateY(0)}

.detail-text{flex:1;min-width:0}
.detail-text h2{font-size:1.4rem;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.detail-text .step-tag{
  display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;
}
.detail-text .desc{color:#cbd5e1;font-size:.95rem;line-height:1.7;margin:14px 0}
.detail-text .desc b{color:var(--text)}

.key-points{list-style:none;margin-top:16px}
.key-points li{
  padding:10px 14px;margin:8px 0;border-radius:8px;background:var(--bg3);
  border-left:3px solid;font-size:.88rem;line-height:1.6;display:flex;align-items:flex-start;gap:8px;
}
.key-points li .bullet{font-size:14px;flex-shrink:0;margin-top:2px}

.detail-svg{flex:1;display:flex;align-items:center;justify-content:center;min-width:0}
.detail-svg svg{width:100%;max-width:480px;height:auto}

/* ===== Animation SVG elements ===== */
@keyframes dashFlow{to{stroke-dashoffset:-20}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes scanMove{0%{transform:translateX(0)}100%{transform:translateX(100%)}}

.flow-line{stroke-dasharray:8 4;animation:dashFlow .8s linear infinite}
.pulse-el{animation:pulse 1.5s ease-in-out infinite}
.float-el{animation:float 2.5s ease-in-out infinite}

/* ===== Controls ===== */
.controls{display:flex;align-items:center;gap:16px;margin-bottom:30px;flex-wrap:wrap;justify-content:center}
.btn{
  padding:10px 24px;border-radius:10px;border:none;cursor:pointer;font-size:.9rem;font-weight:700;
  transition:all .25s;display:flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--fetch);color:#000}
.btn-primary:hover{background:#fbbf24;transform:translateY(-1px)}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid #334155}
.btn-ghost:hover{border-color:#475569}
.speed-control{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.85rem}
.speed-control input[type=range]{-webkit-appearance:none;width:100px;height:4px;background:#334155;border-radius:2px;outline:none}
.speed-control input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--fetch);cursor:pointer}

/* ===== Instruction Example ===== */
.instr-panel{
  width:100%;max-width:1100px;background:var(--bg2);border:1px solid #1e293b;
  border-radius:14px;padding:24px;margin-bottom:30px;
}
.instr-panel h3{font-size:1rem;font-weight:700;margin-bottom:14px;color:var(--muted)}
.instr-row{
  display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
}
.instr-cell{
  padding:10px;border-radius:8px;text-align:center;font-size:.8rem;font-weight:600;
  border:1px solid #1e293b;transition:all .4s;opacity:.35;
}
.instr-cell.active{opacity:1;transform:scale(1.03)}
.instr-cell .ic-addr{font-size:.7rem;color:var(--muted);margin-bottom:4px}
.instr-cell .ic-op{font-size:.85rem}

/* ===== Footer ===== */
.footer{color:var(--muted);font-size:.78rem;text-align:center;margin-top:auto;padding-top:30px}

@media(max-width:768px){
  .pipeline{gap:2px}
  .pipe-stage{width:60px;padding:10px 4px}
  .pipe-icon{font-size:20px}
  .pipe-label{font-size:11px}
  .pipe-sub{display:none}
  .detail-inner{flex-direction:column}
  .instr-row{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <h1>CPU 指令周期</h1>
  <p>点击任意阶段查看详细过程 · 支持自动播放</p>
</div>

<!-- Pipeline Stages -->
<div class="pipeline" id="pipeline">
  <div class="pipe-stage s-fetch" data-stage="0">
    <span class="pipe-num">1</span>
    <div class="pipe-icon">📥</div>
    <div class="pipe-label">取指</div>
    <div class="pipe-sub">Fetch</div>
  </div>
  <span class="pipe-arrow">→</span>
  <div class="pipe-stage s-decode" data-stage="1">
    <span class="pipe-num">2</span>
    <div class="pipe-icon">🔍</div>
    <div class="pipe-label">译码</div>
    <div class="pipe-sub">Decode</div>
  </div>
  <span class="pipe-arrow">→</span>
  <div class="pipe-stage s-execute" data-stage="2">
    <span class="pipe-num">3</span>
    <div class="pipe-icon">⚡</div>
    <div class="pipe-label">执行</div>
    <div class="pipe-sub">Execute</div>
  </div>
  <span class="pipe-arrow">→</span>
  <div class="pipe-stage s-memory" data-stage="3">
    <span class="pipe-num">4</span>
    <div class="pipe-icon">💾</div>
    <div class="pipe-label">访存</div>
    <div class="pipe-sub">Memory</div>
  </div>
  <span class="pipe-arrow">→</span>
  <div class="pipe-stage s-writeback" data-stage="4">
    <span class="pipe-num">5</span>
    <div class="pipe-icon">✍️</div>
    <div class="pipe-label">写回</div>
    <div class="pipe-sub">Write Back</div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn btn-ghost" id="btnPrev">◀ 上一阶段</button>
  <button class="btn btn-primary" id="btnPlay">▶ 自动播放</button>
  <button class="btn btn-ghost" id="btnNext">下一阶段 ▶</button>
  <div class="speed-control">
    <span>速度</span>
    <input type="range" id="speedRange" min="1" max="5" value="3">
    <span id="speedLabel">×3</span>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-inner" id="detailInner"></div>
</div>

<!-- Instruction Pipeline Example -->
<div class="instr-panel">
  <h3>📦 五级流水线示意 — 同一时刻不同指令处于不同阶段</h3>
  <div class="instr-row" id="instrRow"></div>
</div>

<div class="footer">CPU Instruction Cycle · 交互式动态可视化</div>

<script>
// ===== Stage Data =====
const stages = [
  {
    key: 'fetch', label: '取指 (Instruction Fetch)', color: '#f59e0b', dim: '#78500a',
    desc: `从<b>主存（Memory）</b>中取出当前指令。<br><br>
      CPU 根据 <b>PC（程序计数器）</b> 中的地址，通过<b>地址总线</b>将地址发送给内存，内存返回该地址处存储的<b>指令字</b>，通过<b>数据总线</b>传回 CPU 的 <b>IR（指令寄存器）</b>。<br><br>
      取指完成后，<b>PC 自动 +4</b>（32位系统），指向下一条指令。`,
    points: [
      { icon: '📍', text: 'PC 寄存器保存下一条要执行的指令地址' },
      { icon: '🔗', text: '通过地址总线将 PC 值发送给内存' },
      { icon: '📦', text: '内存返回该地址处的机器指令（二进制编码）' },
      { icon: '📝', text: '指令存入 IR（指令寄存器），PC 自增 +4' },
    ],
    svg: 'fetch'
  },
  {
    key: 'decode', label: '译码 (Instruction Decode)', color: '#3b82f6', dim: '#1a3a6e',
    desc: `对取到的指令进行<b>解析</b>，识别操作类型和操作数。<br><br>
      <b>控制单元（CU）</b>解析 IR 中的指令编码，确定：这是什么指令（ADD？LOAD？JMP？）、需要哪些寄存器、是否需要访存。<br><br>
      同时从<b>寄存器堆（Register File）</b>中读取所需的操作数，为执行阶段做好准备。`,
    points: [
      { icon: '🧩', text: 'CU 解析操作码（Opcode）：识别 ADD、SUB、LOAD 等操作' },
      { icon: '📋', text: '解析操作数：寄存器编号 / 立即数 / 内存地址' },
      { icon: '📂', text: '从寄存器堆中读取源操作数（rs、rt）' },
      { icon: '⚙️', text: '生成控制信号，决定 ALU 操作和后续数据通路' },
    ],
    svg: 'decode'
  },
  {
    key: 'execute', label: '执行 (Execute)', color: '#10b981', dim: '#0a5e3a',
    desc: `<b>ALU（算术逻辑单元）</b>执行实际运算。<br><br>
      根据译码阶段的控制信号，ALU 对操作数执行相应的运算：算术运算（加减乘除）、逻辑运算（AND、OR、NOT）、移位操作，或计算<b>内存地址</b>（用于 Load/Store）。<br><br>
      这是 CPU 的"大脑核心"——所有实际的数据处理都在这里发生。`,
    points: [
      { icon: '🧮', text: 'ALU 接收操作数和控制信号' },
      { icon: '➕', text: '算术运算：ADD、SUB、MUL 等' },
      { icon: '🔀', text: '逻辑运算：AND、OR、XOR、NOT' },
      { icon: '📍', text: '地址计算：为 Load/Store 指令计算目标内存地址' },
    ],
    svg: 'execute'
  },
  {
    key: 'memory', label: '访存 (Memory Access)', color: '#a855f7', dim: '#4a2270',
    desc: `仅 <b>Load / Store</b> 指令需要此阶段。<br><br>
      <b>Load</b>：将执行阶段计算出的地址发送给内存，从内存中<b>读取数据</b>。<br>
      <b>Store</b>：将数据<b>写入</b>到执行阶段计算出的内存地址。<br><br>
      算术逻辑类指令（ADD、SUB 等）<b>跳过此阶段</b>，直接进入写回。这是 RISC 架构中简化访存的核心理念——<b>不是所有指令都访存</b>。`,
    points: [
      { icon: '⏭️', text: '非访存指令（ADD 等）直接跳过此阶段' },
      { icon: '📥', text: 'Load：从内存指定地址读取数据到 MDR' },
      { icon: '📤', text: 'Store：将寄存器数据写入内存指定地址' },
      { icon: '🔄', text: 'MDR（内存数据寄存器）作为中转缓冲' },
    ],
    svg: 'memory'
  },
  {
    key: 'writeback', label: '写回 (Write Back)', color: '#ef4444', dim: '#6e1a1a',
    desc: `将运算结果或从内存读取的数据<b>写回寄存器堆</b>。<br><br>
      执行阶段产生的 ALU 结果，或访存阶段从内存读回的数据，通过<b>写回多路选择器</b>选择正确的数据源，写入目标寄存器（rd）。<br><br>
      写回完成后，这条指令的执行即告结束，CPU 继续处理流水线中的下一条指令。<br><br>
      ⚠️ 部分指令（Store、Branch）<b>不需要写回</b>。`,
    points: [
      { icon: '🔀', text: '多路选择器：ALU 结果 or 内存数据？' },
      { icon: '📝', text: '将结果写入目标寄存器 rd' },
      { icon: '⏭️', text: 'Store 指令无需写回（结果已存入内存）' },
      { icon: '🔁', text: '此指令完成，开始下一条指令的周期' },
    ],
    svg: 'writeback'
  }
];

// ===== SVG Templates =====
function svgFetch() {
  return `<svg viewBox="0 0 440 320" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gf1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f59e0b" stop-opacity=".15"/><stop offset="100%" stop-color="#f59e0b" stop-opacity=".03"/></linearGradient>
      <filter id="glow1"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- CPU Box -->
    <rect x="30" y="30" width="380" height="130" rx="14" fill="#111827" stroke="#334155" stroke-width="1.5"/>
    <text x="50" y="56" fill="#94a3b8" font-size="12" font-weight="700">CPU</text>
    <!-- PC -->
    <rect x="50" y="70" width="90" height="70" rx="8" fill="#1a2234" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="95" y="96" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">PC</text>
    <text x="95" y="116" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle" class="pulse-el">0x1004</text>
    <text x="95" y="130" fill="#64748b" font-size="10" text-anchor="middle">程序计数器</text>
    <!-- ARROW PC→IR -->
    <line x1="150" y1="105" x2="200" y2="105" stroke="#f59e0b" stroke-width="2" class="flow-line" filter="url(#glow1)"/>
    <polygon points="200,100 212,105 200,110" fill="#f59e0b" class="pulse-el"/>
    <!-- IR -->
    <rect x="220" y="70" width="90" height="70" rx="8" fill="#1a2234" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="265" y="96" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="middle">IR</text>
    <text x="265" y="116" fill="#e2e8f0" font-size="12" font-weight="600" text-anchor="middle">0x8D050000</text>
    <text x="265" y="130" fill="#64748b" font-size="10" text-anchor="middle">指令寄存器</text>
    <!-- CU -->
    <rect x="330" y="70" width="60" height="70" rx="8" fill="#1a2234" stroke="#475569" stroke-width="1"/>
    <text x="360" y="100" fill="#64748b" font-size="11" font-weight="700" text-anchor="middle">CU</text>
    <text x="360" y="118" fill="#475569" font-size="9" text-anchor="middle">控制</text>
    <!-- MEMORY Box -->
    <rect x="80" y="200" width="280" height="100" rx="14" fill="url(#gf1)" stroke="#f59e0b" stroke-width="1" stroke-opacity=".4"/>
    <text x="100" y="226" fill="#f59e0b" font-size="12" font-weight="700">主存 (Memory)</text>
    <!-- Memory cells -->
    ${[0,1,2,3,4,5].map(i=>`
      <rect x="${100+i*42}" y="240" width="38" height="28" rx="4" fill="#111827" stroke="#334155" stroke-width="1"/>
      <text x="${100+i*42+19}" y="258" fill="#64748b" font-size="9" text-anchor="middle">0x${(0x1000+i*4).toString(16)}</text>
    `).join('')}
    <rect x="184" y="240" width="38" height="28" rx="4" fill="none" stroke="#f59e0b" stroke-width="2" class="pulse-el"/>
    <text x="203" y="258" fill="#f59e0b" font-size="9" text-anchor="middle" font-weight="700">0x1004</text>
    <!-- ARROWS CPU↔Memory -->
    <!-- addr bus (down) -->
    <line x1="95" y1="160" x2="95" y2="195" stroke="#f59e0b" stroke-width="1.5" class="flow-line"/>
    <polygon points="90,195 95,205 100,195" fill="#f59e0b"/>
    <text x="68" y="182" fill="#f59e0b" font-size="9">地址总线</text>
    <!-- data bus (up) -->
    <line x1="265" y1="195" x2="265" y2="160" stroke="#fbbf24" stroke-width="1.5" class="flow-line"/>
    <polygon points="260,160 265,150 270,160" fill="#fbbf24"/>
    <text x="278" y="182" fill="#fbbf24" font-size="9">数据总线</text>
    <!-- PC+4 annotation -->
    <text x="95" y="150" fill="#f59e0b" font-size="10" text-anchor="middle" opacity=".7">PC + 4</text>
  </svg>`;
}

function svgDecode() {
  return `<svg viewBox="0 0 440 320" xmlns="http://www.w3.org/2000/svg">
    <defs><filter id="glow2"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <!-- IR input -->
    <rect x="20" y="60" width="120" height="80" rx="10" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="80" y="88" fill="#3b82f6" font-size="12" font-weight="700" text-anchor="middle">IR</text>
    <text x="80" y="108" fill="#e2e8f0" font-size="11" text-anchor="middle">0x8D 05 00 00</text>
    <text x="80" y="126" fill="#64748b" font-size="9" text-anchor="middle">32-bit 指令字</text>
    <!-- Arrow to CU -->
    <line x1="145" y1="90" x2="185" y2="70" stroke="#3b82f6" stroke-width="2" class="flow-line" filter="url(#glow2)"/>
    <line x1="145" y1="110" x2="185" y2="130" stroke="#3b82f6" stroke-width="2" class="flow-line" filter="url(#glow2)"/>
    <!-- CU -->
    <rect x="190" y="30" width="110" height="80" rx="10" fill="#1a2234" stroke="#3b82f6" stroke-width="2"/>
    <text x="245" y="58" fill="#3b82f6" font-size="13" font-weight="700" text-anchor="middle">CU 控制单元</text>
    <text x="245" y="78" fill="#e2e8f0" font-size="11" text-anchor="middle">Opcode: <tspan fill="#f59e0b">LW</tspan></text>
    <text x="245" y="96" fill="#94a3b8" font-size="10" text-anchor="middle">生成控制信号</text>
    <!-- Control signals -->
    <line x1="300" y1="70" x2="340" y2="70" stroke="#3b82f6" stroke-width="1.5" class="flow-line"/>
    <rect x="345" y="42" width="80" height="58" rx="6" fill="#1a2234" stroke="#475569" stroke-width="1"/>
    <text x="385" y="60" fill="#94a3b8" font-size="9" font-weight="700" text-anchor="middle">控制信号</text>
    <text x="385" y="76" fill="#10b981" font-size="9" text-anchor="middle">ALUOp=Addr</text>
    <text x="385" y="90" fill="#a855f7" font-size="9" text-anchor="middle">MemRead=1</text>

const svgFns = [svgFetch, svgDecode, svgExecute, svgMemory, svgWriteback];

// ===== Instruction Pipeline Example =====
const instrData = [
  { op: 'ADD R3,R1,R2', addr: '0x1000', color: '#f59e0b' },
  { op: 'LW R4,0(R1)', addr: '0x1004', color: '#3b82f6' },
  { op: 'SUB R5,R3,R4', addr: '0x1008', color: '#10b981' },
  { op: 'SW R5,4(R1)', addr: '0x100C', color: '#a855f7' },
  { op: 'AND R6,R3,R5', addr: '0x1010', color: '#ef4444' },
];

// ===== State =====
let currentStage = -1;
let playing = false;
let playTimer = null;
let speed = 3;

// ===== DOM =====
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const detailInner = $('#detailInner');
const instrRow = $('#instrRow');

// ===== Build instruction row =====
instrData.forEach((inst, i) => {
  const cell = document.createElement('div');
  cell.className = 'instr-cell';
  cell.dataset.instr = i;
  cell.style.setProperty('--ic', inst.color);
  cell.innerHTML = `<div class="ic-addr">${inst.addr}</div><div class="ic-op">${inst.op}</div>`;
  instrRow.appendChild(cell);
});

// ===== Render =====
function showStage(idx) {
  if (idx < 0 || idx >= stages.length) return;
  currentStage = idx;
  const s = stages[idx];

  // Update pipeline
  $$('.pipe-stage').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  $$('.pipe-arrow').forEach((el, i) => {
    el.classList.toggle('lit', i < idx);
  });

  // Detail content
  detailInner.innerHTML = `
    <div class="detail-text">
      <h2>
        <span class="step-tag" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}55">
          第 ${idx + 1} 阶段
        </span>
        <span style="color:${s.color}">${s.label}</span>
      </h2>
      <div class="desc">${s.desc}</div>
      <ul class="key-points">
        ${s.points.map(p => `
          <li style="border-left-color:${s.color}">
            <span class="bullet" style="color:${s.color}">${p.icon}</span>
            <span>${p.text}</span>
          </li>
        `).join('')}
      </ul>
    </div>
    <div class="detail-svg">${svgFns[idx]()}</div>
  `;

  // Trigger animation
  detailInner.classList.remove('visible');
  requestAnimationFrame(() => requestAnimationFrame(() => detailInner.classList.add('visible')));

  // Update instruction row — show which stage each instruction would be in during a pipelined execution
  $$('.instr-cell').forEach((cell, i) => {
    const pipelineOffset = idx - i;
    if (pipelineOffset >= 0 && pipelineOffset < 5) {
      const stageColors = ['#f59e0b','#3b82f6','#10b981','#a855f7','#ef4444'];
      cell.classList.add('active');
      cell.style.borderColor = stageColors[pipelineOffset];
      cell.style.boxShadow = `0 0 12px ${stageColors[pipelineOffset]}33`;
    } else {
      cell.classList.remove('active');
      cell.style.borderColor = '';
      cell.style.boxShadow = '';
    }
  });
}

// ===== Controls =====
$('#btnPrev').addEventListener('click', () => {
  stopPlay();
  showStage(currentStage <= 0 ? stages.length - 1 : currentStage - 1);
});

$('#btnNext').addEventListener('click', () => {
  stopPlay();
  showStage(currentStage >= stages.length - 1 ? 0 : currentStage + 1);
});

function startPlay() {
  playing = true;
  $('#btnPlay').textContent = '⏸ 暂停';
  const delays = [3000, 2500, 2000, 1500, 1000];
  tick();
}

function tick() {
  if (!playing) return;
  const next = currentStage >= stages.length - 1 ? 0 : currentStage + 1;
  showStage(next);
  const baseDelay = [3000, 2500, 2000, 1500, 1000][speed - 1];
  playTimer = setTimeout(tick, baseDelay);
}

function stopPlay() {
  playing = false;
  clearTimeout(playTimer);
  $('#btnPlay').textContent = '▶ 自动播放';
}

$('#btnPlay').addEventListener('click', () => {
  if (playing) stopPlay(); else startPlay();
});

$('#speedRange').addEventListener('input', e => {
  speed = parseInt(e.target.value);
  $('#speedLabel').textContent = `×${speed}`;
});

// Click on pipeline stage
$$('.pipe-stage').forEach(el => {
  el.addEventListener('click', () => {
    stopPlay();
    showStage(parseInt(el.dataset.stage));
  });
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { stopPlay(); showStage(currentStage >= stages.length - 1 ? 0 : currentStage + 1); }
  if (e.key === 'ArrowLeft') { stopPlay(); showStage(currentStage <= 0 ? stages.length - 1 : currentStage - 1); }
  if (e.key === ' ') { e.preventDefault(); playing ? stopPlay() : startPlay(); }
});

// Init
showStage(0);
</script>
