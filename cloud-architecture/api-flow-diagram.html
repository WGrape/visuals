<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API请求全链路架构图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #0f0c29, #1a1a2e); min-height: 100vh; color: #e0e0e0; overflow-x: auto; }
        .header { text-align: center; padding: 30px; background: linear-gradient(180deg, rgba(0,212,255,0.1), transparent); }
        .header h1 { font-size: 2em; background: linear-gradient(90deg, #00d4ff, #7b2ff7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.05); margin: 15px auto; max-width: 900px; border-radius: 10px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.85em; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .diagram-container { padding: 30px; }
        svg { min-width: 1600px; margin: 0 auto; display: block; }
        .node { cursor: pointer; transition: all 0.3s; }
        .node:hover { filter: brightness(1.3); transform: scale(1.02); }
        .node-bg { transition: stroke-width 0.3s; }
        .node:hover .node-bg { stroke-width: 3; }
        .arrow { stroke-dasharray: 6, 3; animation: flow 1s linear infinite; }
        @keyframes flow { from { stroke-dashoffset: 9; } to { stroke-dashoffset: 0; } }
        .stage-bg { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); stroke-width: 1; rx: 15; }
        .stage-label { font-size: 13px; fill: #8892b0; font-weight: 500; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; border: 1px solid rgba(0,212,255,0.3); border-radius: 16px; padding: 25px; max-width: 550px; width: 90%; max-height: 75vh; overflow-y: auto; }
        .modal h2 { color: #00d4ff; margin-bottom: 15px; }
        .modal li { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); color: #b0b0b0; font-size: 0.9em; }
        .modal li:before { content: "▸"; color: #00d4ff; margin-right: 8px; }
        .modal-close { margin-top: 15px; padding: 8px 25px; background: linear-gradient(90deg, #00d4ff, #7b2ff7); border: none; border-radius: 6px; color: white; cursor: pointer; }
        .footer { text-align: center; padding: 25px; color: #5a6a8a; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌐 API 请求全链路架构图</h1>
        <p style="color:#8892b0;margin-top:8px;">api.example.com/api/login · 点击任意组件查看详情</p>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4CAF50"></div><span>网络/DNS</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#2196F3"></div><span>安全防护</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#FF9800"></div><span>负载均衡</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#9C27B0"></div><span>网关/代理</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#E91E63"></div><span>微服务</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#00BCD4"></div><span>基础设施</span></div>
        <div class="legend-item"><div class="legend-dot" style="background:#F44336"></div><span>缓存/存储</span></div>
    </div>
    
    <div class="diagram-container">
        <svg viewBox="0 0 1600 920" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="gBlue" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2196F3"/><stop offset="100%" stop-color="#1976D2"/></linearGradient>
                <linearGradient id="gGreen" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4CAF50"/><stop offset="100%" stop-color="#388E3C"/></linearGradient>
                <linearGradient id="gOrange" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FF9800"/><stop offset="100%" stop-color="#F57C00"/></linearGradient>
                <linearGradient id="gPurple" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#9C27B0"/><stop offset="100%" stop-color="#7B1FA2"/></linearGradient>
                <linearGradient id="gPink" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#E91E63"/><stop offset="100%" stop-color="#C2185B"/></linearGradient>
                <linearGradient id="gCyan" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#00BCD4"/><stop offset="100%" stop-color="#0097A7"/></linearGradient>
                <linearGradient id="gRed" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#F44336"/><stop offset="100%" stop-color="#D32F2F"/></linearGradient>
                <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#5a6a8a"/></marker>
                <filter id="glow"><feGaussianBlur stdDeviation="3" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            
            <!-- ==================== 阶段1: DNS解析 ==================== -->
            <rect class="stage-bg" x="15" y="15" width="250" height="890" rx="18"/>
            <text class="stage-label" x="140" y="42">① DNS解析层</text>
            
            <!-- 客户端 -->
            <g class="node" onclick="showModal('client')">
                <rect x="75" y="60" width="130" height="75" rx="10" fill="#2a2a4a" stroke="#4CAF50" stroke-width="2"/>
                <text x="140" y="92" text-anchor="middle" fill="#4CAF50" font-size="12" font-weight="bold">🌐 客户端</text>
                <text x="140" y="112" text-anchor="middle" fill="#b0b0b0" font-size="10">Browser / App</text>
                <text x="140" y="126" text-anchor="middle" fill="#666" font-size="9">HTTP Request</text>
            </g>
            
            <!-- DNS解析 -->
            <g class="node" onclick="showModal('dns')">
                <rect x="75" y="155" width="130" height="70" rx="10" fill="#2a2a4a" stroke="#4CAF50" stroke-width="2"/>
                <text x="140" y="188" text-anchor="middle" fill="#4CAF50" font-size="12" font-weight="bold">🔍 DNS解析</text>
                <text x="140" y="208" text-anchor="middle" fill="#b0b0b0" font-size="10">域名 → IP</text>
            </g>
            
            <!-- DNS服务器 -->
            <g class="node" onclick="showModal('dnsserver')">
                <rect x="40" y="245" width="90" height="55" rx="8" fill="#1e3a5f" stroke="#4CAF50" stroke-width="1.5"/>
                <text x="85" y="272" text-anchor="middle" fill="#4CAF50" font-size="9">Local DNS</text>
                <text x="85" y="288" text-anchor="middle" fill="#666" font-size="8">递归缓存</text>
            </g>
            
            <g class="node" onclick="showModal('dnsserver')">
                <rect x="150" y="245" width="90" height="55" rx="8" fill="#1e3a5f" stroke="#4CAF50" stroke-width="1.5"/>
                <text x="195" y="272" text-anchor="middle" fill="#4CAF50" font-size="9">权威DNS</text>
                <text x="195" y="288" text-anchor="middle" fill="#666" font-size="8">NS记录</text>
            </g>
            
            <!-- CNAME -->
            <g class="node" onclick="showModal('cname')">
                <rect x="40" y="320" width="200" height="55" rx="8" fill="#1e3a5f" stroke="#00d4ff" stroke-width="2"/>
                <text x="140" y="350" text-anchor="middle" fill="#00d4ff" font-size="11" font-weight="bold">🔗 CNAME 链</text>
                <text x="140" y="365" text-anchor="middle" fill="#b0b0b0" font-size="9">api.example.com → cdn.example.com</text>
            </g>
            
            <!-- CDN -->
            <g class="node" onclick="showModal('cdn')">
                <rect x="40" y="395" width="200" height="55" rx="8" fill="#1e3a5f" stroke="#4CAF50" stroke-width="1.5"/>
                <text x="140" y="420" text-anchor="middle" fill="#4CAF50" font-size="11" font-weight="bold">⚡ CDN边缘节点</text>
                <text x="140" y="438" text-anchor="middle" fill="#666" font-size="9">就近接入 / 静态缓存</text>
            </g>
            
            <!-- 箭头: 客户端 → DNS -->
            <line x1="140" y1="135" x2="140" y2="148" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr)"/>
            <!-- DNS → DNS服务器 -->
            <path d="M 110 225 Q 85 235 85 240" stroke="#4CAF50" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
            <path d="M 170 225 Q 195 235 195 240" stroke="#4CAF50" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
            <!-- DNS服务器 → CNAME -->
            <path d="M 85 300 Q 112 305 115 315" stroke="#4CAF50" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
            <path d="M 195 300 Q 165 305 165 315" stroke="#4CAF50" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
            <!-- CNAME → CDN -->
            <line x1="140" y1="375" x2="140" y2="388" stroke="#00d4ff" stroke-width="2" marker-end="url(#arr)"/>
            
            <!-- ==================== 阶段2: 云安全层 ==================== -->
            <rect class="stage-bg" x="285" y="15" width="285" height="890" rx="18"/>
            <text class="stage-label" x="428" y="42">② 云安全层</text>
            
            <!-- 云边界 -->
            <rect x="295" y="55" width="265" height="830" rx="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-dasharray="4,4"/>
            <text x="428" y="78" text-anchor="middle" fill="#5a6a8a" font-size="10">🏢 云服务商边界 (AWS/阿里云/腾讯云)</text>
            
            <!-- Anti-DDoS -->
            <g class="node" onclick="showModal('antiddos')">
                <rect x="350" y="100" width="155" height="65" rx="10" fill="#1e3a5f" stroke="#FF9800" stroke-width="2"/>
                <text x="428" y="128" text-anchor="middle" fill="#FF9800" font-size="12" font-weight="bold">🛡️ Anti-DDoS</text>
                <text x="428" y="148" text-anchor="middle" fill="#b0b0b0" font-size="9">流量清洗 / Tbps级防护</text>
            </g>
            
            <!-- WAF -->
            <g class="node" onclick="showModal('waf')">
                <rect x="350" y="185" width="155" height="65" rx="10" fill="#1e3a5f" stroke="#F44336" stroke-width="2"/>
                <text x="428" y="213" text-anchor="middle" fill="#F44336" font-size="12" font-weight="bold">🛡️ WAF</text>
                <text x="428" y="233" text-anchor="middle" fill="#b0b0b0" font-size="9">SQL注入/XSS/CC防护</text>
            </g>
            
            <!-- API Gateway -->
            <g class="node" onclick="showModal('apigateway')">
                <rect x="350" y="270" width="155" height="65" rx="10" fill="#1e3a5f" stroke="#9C27B0" stroke-width="2"/>
                <text x="428" y="298" text-anchor="middle" fill="#9C27B0" font-size="12" font-weight="bold">🔮 API Gateway</text>
                <text x="428" y="318" text-anchor="middle" fill="#b0b0b0" font-size="9">鉴权/限流/路由</text>
            </g>
            
            <!-- 流量分析/IDS -->
            <g class="node" onclick="showModal('idsips')">
                <rect x="295" y="270" width="45" height="65" rx="8" fill="#1e3a5f" stroke="#9C27B0" stroke-width="1.5"/>
                <text x="317" y="307" text-anchor="middle" fill="#9C27B0" font-size="7" transform="rotate(-90,317,307)">IDS/IPS</text>
            </g>
            
            <g class="node" onclick="showModal('flow')">
                <rect x="510" y="270" width="45" height="65" rx="8" fill="#1e3a5f" stroke="#9C27B0" stroke-width="1.5"/>
                <text x="532" y="307" text-anchor="middle" fill="#9C27B0" font-size="7" transform="rotate(90,532,307)">流量分析</text>
            </g>
            
            <!-- 箭头 -->
            <line x1="428" y1="165" x2="428" y2="178" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/>
            <line x1="428" y1="250" x2="428" y2="263" stroke="#F44336" stroke-width="2" marker-end="url(#arr)"/>
            <line x1="345" y1="302" x2="345" y2="302" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arr)"/>
            <line x1="505" y1="302" x2="505" y2="302" stroke="#9C27B0" stroke-width="1.5" marker-end="url(#arr)"/>
            <line x1="428" y1="335" x2="428" y2="360" stroke="#9C27B0" stroke-width="2" marker-end="url(#arr)"/>
            
            <!-- ==================== 阶段3: 负载均衡 ==================== -->
            <rect class="stage-bg" x="590" y="15" width="250" height="890" rx="18"/>
            <text class="stage-label" x="715" y="42">③ 负载均衡层</text>
            
            <!-- 公网SLB -->
            <g class="node" onclick="showModal('slbpublic')">
                <rect x="620" y="75" width="190" height="75" rx="12" fill="#1e3a5f" stroke="#FF9800" stroke-width="2"/>
                <text x="715" y="108" text-anchor="middle" fill="#FF9800" font-size="12" font-weight="bold">⚖️ 公网 SLB</text>
                <text x="715" y="128" text-anchor="middle" fill="#b0b0b0" font-size="10">Server Load Balancer</text>
                <text x="715" y="142" text-anchor="middle" fill="#666" font-size="9">ALB / CLB / 腾讯云CLB</text>
            </g>
            
            <!-- VIP -->
            <g class="node" onclick="showModal('vip')">
                <rect x="620" y="170" width="190" height="55" rx="8" fill="#2a2a4a" stroke="#FF9800" stroke-width="1.5"/>
                <text x="715" y="200" text-anchor="middle" fill="#FF9800" font-size="11" font-weight="bold">🌐 VIP 虚拟IP</text>
                <text x="715" y="216" text-anchor="middle" fill="#666" font-size="9">高可用浮动IP / VRRP</text>
            </g>
            
            <!-- 私网SLB -->
            <g class="node" onclick="showModal('slbprivate')">
                <rect x="620" y="245" width="190" height="75" rx="12" fill="#1e3a5f" stroke="#FF9800" stroke-width="2"/>
                <text x="715" y="278" text-anchor="middle" fill="#FF9800" font-size="12" font-weight="bold">⚖️ 私网 SLB</text>
                <text x="715" y="298" text-anchor="middle" fill="#b0b0b0" font-size="10">K8s Ingress</text>
                <text x="715" y="312" text-anchor="middle" fill="#666" font-size="9">Nginx Ingress / Traefik</text>
            </g>
            
            <!-- 健康检查 -->
            <g class="node" onclick="showModal('healthcheck')">
                <rect x="620" y="340" width="190" height="50" rx="8" fill="#2a2a4a" stroke="#4CAF50" stroke-width="1.5"/>
                <text x="715" y="370" text-anchor="middle" fill="#4CAF50" font-size="10">❤️ 健康检查 (TCP/HTTP)</text>
            </g>
            
            <!-- 箭头 -->
            <line x1="715" y1="150" x2="715" y2="163" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/>
            <line x1="715" y1="225" x2="715" y2="238" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/>
            <line x1="715" y1="320" x2="715" y2="333" stroke="#FF9800" stroke-width="2" marker-end="url(#arr)"/>
            
            <!-- ==================== 阶段4: Nginx层 ==================== -->
            <rect class="stage-bg" x="860" y="15" width="270" height="890" rx="18"/>
            <text class="stage-label" x="995" y="42">④ Nginx层</text>
            
            <!-- Nginx集群 -->
            <g class="node" onclick="showModal('nginx')">
                <rect x="910" y="75" width="170" height="60" rx="10" fill="#1e3a5f" stroke="#4CAF50" stroke-width="2"/>
                <text x="995" y="103" text-anchor="middle" fill="#4CAF50" font-size="12" font-weight="bold">🐇 Nginx集群</text>
                <text x="995" y="123" text-anchor="middle" fill="#666" font-size="9">反向代理 / 负载均衡</text>
            </g>
            
            <!-- Upstream组 -->
            <g class="node" onclick="showModal('upstream')">
                <rect x="905" y="155" width="80" height="50" rx="8" fill="#2a2a4a" stroke="#4CAF50" stroke-width="1.5"/>
                <text x="945" y="185" text-anchor="middle" fill="#b0b0b0" font-size="9">Upstream-A</text>
            </g>
            
            <g class="node" onclick="showModal('upstream')">
                <rect x="1005" y="155" width="80" height="50" rx="8" fill="#2a2a4a" stroke="#4CAF50" stroke-width="1.5"/>
                <text x="1045" y="185" text-anchor="middle" fill="#b0b0b0" font-size="9">Upstream-B</text>
            </g>
            
            <!-- SSL终止 -->
            <g class="node" onclick="showModal('ssl')">
                <rect x="910" y="225" width="170" height="55" rx="10" fill="#1e3a5f" stroke="#00BCD4" stroke-width="2"/>
                <text x="995" y="252" text-anchor="middle" fill="#00BCD4" font-size="11" font-weight="bold">🔐 SSL/TLS终止</text>
                <text x="995" y="270" text-anchor="middle" fill="#666" font-size="9">HTTPS → HTTP</text>
            </g>
            
            <!-- Nginx WAF -->
            <g class="node" onclick="showModal('nginxwaf')">
                <rect x="910" y="300" width="170" height="55" rx="10" fill="#1e3a5f" stroke="#F44336" stroke-width="2"/>
                <text x="995" y="327" text-anchor="middle" fill="#F44336" font-size="11" font-weight="bold">🛡️ ModSecurity</text>
                <text x="995" y="345" text-anchor="middle" fill="#666" font-size="9">WAF规则集</text>
            </g>
            
            <!-- 静态缓存 -->
            <g class="node" onclick="showModal('static')">
                <rect x="905" y="375" width="80" height="50" rx="8" fill="#1e3a5f" stroke="#FF9800" stroke-width="1.5"/>
                <text x="945" y="405" text-anchor="middle" fill="#FF9800" font-size="9">静态资源</text>
            </g>
            
            <g class="node" onclick="showModal('cache')">
                <rect x="1005" y="375" width="80" height="50" rx="8" fill="#1e3a5f" stroke="#FF9800" stroke-width="1.5"/>
                <text x="1045" y="405" text-anchor="middle" fill="#FF9800" font-size="9">Nginx Cache</text>
            </g>
            
            <!-- 灰度发布 -->
            <g class="node" onclick="showModal('canary')">
                <rect x="910" y="445" width="170" height="50" rx="8" fill="#1e3a5f" stroke="#9C27B0" stroke-width="1.5"/>
                <text x="995" y="475" text-anchor="middle" fill="#9C27B0" font-size="10">🎯 灰度/金丝雀发布</text>
            </g>
            
            <!-- 箭头 -->
            <line x1="945" y1="205" x2="995" y2="220" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr)"/>
            <line x1="1045" y1="205" x2="995" y2="220" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr)"/>
            <line x1="995" y1="280" x2="995" y2="293" stroke="#00BCD4" stroke-width="1.5" marker-end="url(#arr)"/>
            <line x1="995" y1="355" x2="995" y2="368" stroke="#F44336" stroke-width="1.5" marker-end="url(#arr)"/>
            <path d="M 945 425 Q 995 435 995 440" stroke="#FF9800" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
            <path d="M 1045 425 Q 995 435 995 440" stroke="#FF9800" stroke-width="1.5" fill="none" stroke-dasharray="3,2"/>
            
            <!-- ==================== 阶段5: 服务网格 ==================== -->
            <rect class="stage-bg" x="1150" y="15" width="220" height="890" rx="18"/>
            <text class="stage-label" x="1260" y="42">⑤ 服务网格</text>
            
            <!-- K8s边界 -->
            <rect x="1160" y="60" width="200" height="830" rx="12" fill="none" stroke="rgba(0,212,255,0.25)" stroke-dasharray="4,4"/>
            <text x="1260" y="82" text-anchor="middle" fill="#00d4ff" font-size="10">☸️ Kubernetes集群</text>
            
            <!-- Istio/Envoy -->
            <g class="node" onclick="showModal('istio')">
                <rect x="1190" y="100" width="140" height="65" rx="10" fill="#1e3a5f" stroke="#7b2ff7" stroke-width="2"/>
                <text x="1260" y="128" text-anchor="middle" fill="#7b2ff7" font-size="12" font-weight="bold">🔮 Sidecar</text>
                <text x="1260" y="148" text-anchor="middle" fill="#b0b0b0" font-size="9">Envoy/Istio</text>
                <text x="1260" y="162" text-anchor="middle" fill="#666" font-size="8">mTLS/熔断/限流</text>
            </g>
            
            <!-- K8s Ingress -->
            <g class="node" onclick="showModal('k8sgw')">
                <rect x="1190" y="185" width="140" height="55" rx="10" fill="#1e3a5f" stroke="#9C27B0" stroke-width="2"/>
                <text x="1260" y="212" text-anchor="middle" fill="#9C27B0" font-size="11" font-weight="bold">🌉 Ingress</text>
                <text x="1260" y="230" text-anchor="middle" fill="#666" font-size="9">Spring Cloud GW</text>
            </g>
            
            <!-- 服务注册 -->
            <g class="node" onclick="showModal('registry')">
                <rect x="1190" y="260" width="140" height="55" rx="10" fill="#1e3a5f" stroke="#00BCD4" stroke-width="2"/>
                <text x="1260" y="287" text-anchor="middle" fill="#00BCD4" font-size="11" font-weight="bold">📋 注册中心</text>
                <text x="1260" y="305" text-anchor="middle" fill="#666" font-size="9">Nacos/Consul</text>
            </g>
            
            <!-- 配置中心 -->
