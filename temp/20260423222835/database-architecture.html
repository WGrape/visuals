<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redis & MySQL 架构图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 40px 20px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    color: #f8fafc;
    margin-bottom: 10px;
  }
  .subtitle {
    text-align: center;
    color: #94a3b8;
    margin-bottom: 50px;
    font-size: 14px;
  }
  .section-title {
    font-size: 24px;
    color: #f8fafc;
    text-align: center;
    margin: 50px 0 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .section-title .badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .badge-redis { background: #dc2626; color: white; }
  .badge-mysql { background: #2563eb; color: white; }
  .diagram-container {
    max-width: 900px;
    margin: 0 auto;
    background: #1e293b;
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.4);
  }
  svg { display: block; margin: 0 auto; }

  /* Common SVG styles */
  .box { rx: 8; ry: 8; }
  .box-redis { fill: #991b1b; stroke: #f87171; stroke-width: 2; }
  .box-redis-light { fill: #7f1d1d; stroke: #f87171; stroke-width: 1.5; }
  .box-redis-accent { fill: #b91c1c; stroke: #fca5a5; stroke-width: 2; }
  .box-mysql { fill: #1e3a5f; stroke: #60a5fa; stroke-width: 2; }
  .box-mysql-light { fill: #1e3a5f; stroke: #60a5fa; stroke-width: 1.5; }
  .box-mysql-accent { fill: #1e40af; stroke: #93c5fd; stroke-width: 2; }
  .text-white { fill: #f8fafc; font-size: 14px; font-weight: 600; }
  .text-light { fill: #cbd5e1; font-size: 12px; }
  .text-dim { fill: #94a3b8; font-size: 11px; }
  .text-title { fill: #f8fafc; font-size: 13px; font-weight: 700; }
  .text-sub { fill: #94a3b8; font-size: 10px; }
  .arrow-redis { stroke: #f87171; stroke-width: 2; fill: none; marker-end: url(#arrowRed); }
  .arrow-mysql { stroke: #60a5fa; stroke-width: 2; fill: none; marker-end: url(#arrowBlue); }
  .dashed-redis { stroke: #f87171; stroke-width: 1.5; fill: none; stroke-dasharray: 6,4; marker-end: url(#arrowRed); }
  .dashed-mysql { stroke: #60a5fa; stroke-width: 1.5; fill: none; stroke-dasharray: 6,4; marker-end: url(#arrowBlue); }
  .layer-label { fill: #475569; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<h1>🗄️ Redis & MySQL 架构对比</h1>
<p class="subtitle">内存数据库 vs 关系型数据库的核心架构</p>

<!-- ==================== Redis 架构图 ==================== -->
<h2 class="section-title">
  <span class="badge badge-redis">Redis</span> 主要架构
</h2>

<div class="diagram-container">
<svg width="820" height="780" viewBox="0 0 820 780">
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Layer: Client -->
  <text x="40" y="35" class="layer-label">客户端层</text>
  <rect x="120" y="15" width="140" height="40" class="box box-redis-light" filter="url(#shadow)"/>
  <text x="190" y="40" text-anchor="middle" class="text-white">redis-cli</text>
  <rect x="290" y="15" width="140" height="40" class="box box-redis-light" filter="url(#shadow)"/>
  <text x="360" y="40" text-anchor="middle" class="text-white">Jedis / Lettuce</text>
  <rect x="460" y="15" width="140" height="40" class="box box-redis-light" filter="url(#shadow)"/>
  <text x="530" y="40" text-anchor="middle" class="text-white">redis-py</text>
  <rect x="630" y="15" width="140" height="40" class="box box-redis-light" filter="url(#shadow)"/>
  <text x="700" y="40" text-anchor="middle" class="text-white">Spring Data Redis</text>

  <!-- Arrow -->
  <line x1="410" y1="58" x2="410" y2="88" class="arrow-redis"/>
  <text x="430" y="78" class="text-dim">RESP 协议 (TCP)</text>

  <!-- Layer: Network -->
  <text x="40" y="115" class="layer-label">网络层</text>
  <rect x="160" y="90" width="500" height="45" class="box box-redis" filter="url(#shadow)" rx="10" ry="10"/>
  <text x="410" y="118" text-anchor="middle" class="text-title">TCP Socket 监听 (默认端口 6379)</text>

  <!-- Arrow -->
  <line x1="410" y1="138" x2="410" y2="168" class="arrow-redis"/>

  <!-- Layer: Protocol Parser -->
  <text x="40" y="195" class="layer-label">协议层</text>
  <rect x="160" y="168" width="500" height="45" class="box box-redis" filter="url(#shadow)" rx="10" ry="10"/>
  <text x="410" y="196" text-anchor="middle" class="text-title">RESP 协议解析器</text>

  <!-- Arrow -->
  <line x1="410" y1="216" x2="410" y2="246" class="arrow-redis"/>

  <!-- Layer: Command Processing -->
  <text x="40" y="278" class="layer-label">命令处理</text>
  <rect x="110" y="248" width="180" height="55" class="box box-redis-accent" filter="url(#shadow)"/>
  <text x="200" y="273" text-anchor="middle" class="text-title">命令分发器</text>
  <text x="200" y="290" text-anchor="middle" class="text-sub">commandDispatch()</text>

  <rect x="320" y="248" width="180" height="55" class="box box-redis-accent" filter="url(#shadow)"/>
  <text x="410" y="273" text-anchor="middle" class="text-title">命令执行器</text>
  <text x="410" y="290" text-anchor="middle" class="text-sub">call() → execCommand()</text>

  <rect x="530" y="248" width="180" height="55" class="box box-redis-accent" filter="url(#shadow)"/>
  <text x="620" y="273" text-anchor="middle" class="text-title">回复构建器</text>
  <text x="620" y="290" text-anchor="middle" class="text-sub">addReply()</text>

  <line x1="293" y1="275" x2="318" y2="275" class="arrow-redis"/>
  <line x1="503" y1="275" x2="528" y2="275" class="arrow-redis"/>

  <!-- Arrow -->
  <line x1="410" y1="306" x2="410" y2="336" class="arrow-redis"/>

  <!-- Layer: Data Types -->
  <text x="40" y="372" class="layer-label">数据结构</text>
  <rect x="60" y="338" width="130" height="60" class="box box-redis-light" filter="url(#shadow)"/>
  <text x="125" y="363" text-anchor="middle" class="text-title">String</text>
  <text x="125" y="382" text-anchor="middle" class="text-sub">SDS (Simple Dynamic String)</text>

  <rect x="205" y="338" width="130" height="60" class="box box-redis-light" filter="url(#shadow)"/>
  <text x="270" y="363" text-anchor="middle" class="text-title">List</text>
  <text x="270" y="382" text-anchor="middle" class="text-sub">quicklist / listpack</text>

  <rect x="350" y="338" width="130" height="60" class="box box-redis-light" filter="url(#shadow)"/>
  <text x="415" y="363" text-anchor="middle" class="text-title">Hash</text>
  <text x="415" y="382" text-anchor="middle" class="text-sub">dict + listpack</text>

  <rect x="495" y="338" width="130" height="60" class="box box-redis-light" filter="url(#shadow)"/>
  <text x="560" y="363" text-anchor="middle" class="text-title">Set</text>
  <text x="560" y="382" text-anchor="middle" class="text-sub">dict / intset</text>

  <rect x="640" y="338" width="145" height="60" class="box box-redis-light" filter="url(#shadow)"/>
  <text x="712" y="363" text-anchor="middle" class="text-title">ZSet (Sorted Set)</text>
  <text x="712" y="382" text-anchor="middle" class="text-sub">skiplist + dict + listpack</text>

  <!-- Arrow -->
  <line x1="410" y1="401" x2="410" y2="431" class="arrow-redis"/>

  <!-- Layer: Memory & Persistence -->
  <text x="40" y="462" class="layer-label">存储引擎</text>

  <rect x="110" y="433" width="260" height="55" class="box box-redis" filter="url(#shadow)" rx="10" ry="10"/>
  <text x="240" y="458" text-anchor="middle" class="text-title">内存管理</text>
  <text x="240" y="476" text-anchor="middle" class="text-sub">jemalloc / 内存淘汰策略 (LRU/LFU/TTL)</text>

  <rect x="400" y="433" width="300" height="55" class="box box-redis" filter="url(#shadow)" rx="10" ry="10"/>
  <text x="550" y="455" text-anchor="middle" class="text-title">持久化机制</text>
  <text x="550" y="472" text-anchor="middle" class="text-sub">RDB 快照 (bgsave)</text>
  <text x="550" y="486" text-anchor="middle" class="text-sub">AOF 日志 (append only file)</text>

  <line x1="373" y1="460" x2="398" y2="460" class="arrow-redis"/>

  <!-- Arrow -->
  <line x1="410" y1="491" x2="410" y2="521" class="arrow-redis"/>

  <!-- Layer: High Availability -->
  <text x="40" y="555" class="layer-label">高可用</text>

  <rect x="60" y="523" width="200" height="60" class="box box-redis-accent" filter="url(#shadow)"/>
  <text x="160" y="548" text-anchor="middle" class="text-title">主从复制</text>
  <text x="160" y="567" text-anchor="middle" class="text-sub">Master → Slave (异步复制)</text>

  <rect x="290" y="523" width="200" height="60" class="box box-redis-accent" filter="url(#shadow)"/>
  <text x="390" y="548" text-anchor="middle" class="text-title">哨兵 Sentinel</text>
  <text x="390" y="567" text-anchor="middle" class="text-sub">自动故障转移 + 监控</text>

  <rect x="520" y="523" width="250" height="60" class="box box-redis-accent" filter="url(#shadow)"/>
  <text x="645" y="548" text-anchor="middle" class="text-title">集群 Cluster</text>
  <text x="645" y="567" text-anchor="middle" class="text-sub">16384 Slots / 数据分片 / Gossip</text>

  <!-- Arrow -->
  <line x1="410" y1="586" x2="410" y2="616" class="arrow-redis"/>

  <!-- Layer: Event Model -->
  <text x="40" y="648" class="layer-label">事件模型</text>
  <rect x="160" y="618" width="500" height="45" class="box box-redis" filter="url(#shadow)" rx="10" ry="10"/>
  <text x="410" y="640" text-anchor="middle" class="text-title">事件驱动模型 (epoll / kqueue / select)</text>
  <text x="410" y="655" text-anchor="middle" class="text-sub">文件事件 (I/O) + 时间事件 (定时任务 / 过期键清理)</text>

  <!-- Divider -->
  <line x1="60" y1="685" x2="760" y2="685" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Key Features -->
  <text x="410" y="710" text-anchor="middle" class="text-dim" font-size="12">
    ✦ 单线程模型 (核心命令处理)  ✦ 原子操作  ✦ 10W+ QPS  ✦ 毫秒级延迟  ✦ 丰富的数据结构
  </text>

</svg>
</div>

<!-- ==================== MySQL 架构图 ==================== -->
<h2 class="section-title">
  <span class="badge badge-mysql">MySQL</span> 主要架构
</h2>

<div class="diagram-container">
<svg width="820" height="920" viewBox="0 0 820 920">
  <!-- Layer: Client -->
  <text x="40" y="35" class="layer-label">客户端层</text>
  <rect x="80" y="15" width="150" height="40" class="box box-mysql-light" filter="url(#shadow)"/>
  <text x="155" y="40" text-anchor="middle" class="text-white">mysql CLI</text>
  <rect x="255" y="15" width="150" height="40" class="box box-mysql-light" filter="url(#shadow)"/>
  <text x="330" y="40" text-anchor="middle" class="text-white">JDBC / Navicat</text>
  <rect x="430" y="15" width="150" height="40" class="box box-mysql-light" filter="url(#shadow)"/>
  <text x="505" y="40" text-anchor="middle" class="text-white">MySQL Connector</text>
  <rect x="605" y="15" width="180" height="40" class="box box-mysql-light" filter="url(#shadow)"/>
  <text x="695" y="40" text-anchor="middle" class="text-white">ORM (MyBatis/Sequelize)</text>

  <!-- Arrow -->
  <line x1="410" y1="58" x2="410" y2="88" class="arrow-mysql"/>
  <text x="430" y="78" class="text-dim">MySQL Protocol (TCP)</text>

  <!-- Layer: Connection Management -->
  <text x="40" y="118" class="layer-label">连接管理</text>
  <rect x="120" y="90" width="580" height="50" class="box box-mysql" filter="url(#shadow)" rx="10" ry="10"/>
  <text x="410" y="113" text-anchor="middle" class="text-title">连接池管理 (Connectors)</text>
  <text x="410" y="130" text-anchor="middle" class="text-sub">认证 (Authentication) · 线程管理 (Thread Pool) · 连接限制 (max_connections)</text>

  <!-- Arrow -->
  <line x1="410" y1="143" x2="410" y2="173" class="arrow-mysql"/>

  <!-- Layer: SQL Interface -->
  <text x="40" y="200" class="layer-label">SQL 接口</text>
  <rect x="120" y="173" width="580" height="45" class="box box-mysql" filter="url(#shadow)" rx="10" ry="10"/>
  <text x="410" y="200" text-anchor="middle" class="text-title">SQL Interface — DML / DDL / DCL / 事务控制</text>

  <!-- Arrow -->
  <line x1="410" y1="221" x2="410" y2="251" class="arrow-mysql"/>

  <!-- Layer: Parser -->
  <text x="40" y="282" class="layer-label">解析器</text>
  <rect x="120" y="253" width="280" height="50" class="box box-mysql-accent" filter="url(#shadow)"/>
  <text x="260" y="276" text-anchor="middle" class="text-title">词法 / 语法解析器</text>
  <text x="260" y="293" text-anchor="middle" class="text-sub">Lexer + Parser → AST (抽象语法树)</text>

  <rect x="420" y="253" width="280" height="50" class="box box-mysql-accent" filter="url(#shadow)"/>
  <text x="560" y="276" text-anchor="middle" class="text-title">预处理器</text>
  <text x="560" y="293" text-anchor="middle" class="text-sub">语义检查 · 表/列存在性校验 · 权限验证</text>

  <line x1="403" y1="278" x2="418" y2="278" class="arrow-mysql"/>

  <!-- Arrow -->
  <line x1="410" y1="306" x2="410" y2="336" class="arrow-mysql"/>

  <!-- Layer: Optimizer -->
  <text x="40" y="367" class="layer-label">优化器</text>
  <rect x="120" y="338" width="580" height="50" class="box box-mysql" filter="url(#shadow)" rx="10" ry="10"/>
  <text x="410" y="360" text-anchor="middle" class="text-title">查询优化器 (Query Optimizer)</text>
  <text x="410" y="377" text-anchor="middle" class="text-sub">基于代价优化 (CBO) · 执行计划选择 · 索引选择 · 表连接顺序优化 · 子查询优化</text>

  <!-- Arrow -->
  <line x1="410" y1="391" x2="410" y2="421" class="arrow-mysql"/>

  <!-- Layer: Executor + Plugins -->
  <text x="40" y="452" class="layer-label">执行器</text>
  <rect x="120" y="423" width="370" height="50" class="box box-mysql" filter="url(#shadow)" rx="10" ry="10"/>
  <text x="305" y="446" text-anchor="middle" class="text-title">执行引擎 (Executor)</text>
  <text x="305" y="463" text-anchor="middle" class="text-sub">调用存储引擎 API · 逐行/批量返回结果</text>

  <rect x="510" y="423" width="190" height="50" class="box box-mysql-light" filter="url(#shadow)"/>
  <text x="605" y="446" text-anchor="middle" class="text-title">插件体系</text>
  <text x="605" y="463" text-anchor="middle" class="text-sub">UDF / 全文索引 / 审计</text>

  <line x1="493" y1="448" x2="508" y2="448" class="dashed-mysql"/>

  <!-- Arrow -->
  <line x1="410" y1="476" x2="410" y2="516" class="arrow-mysql"/>

  <!-- Layer: Storage Engines -->
  <text x="40" y="548" class="layer-label">存储引擎层</text>

  <rect x="60" y="520" width="320" height="55" class="box box-mysql-accent" filter="url(#shadow)"/>
  <text x="220" y="545" text-anchor="middle" class="text-title">InnoDB (默认引擎)</text>
  <text x="220" y="563" text-anchor="middle" class="text-sub">事务支持 · 行级锁 · MVCC · 聚簇索引 · 外键</text>

  <rect x="410" y="520" width="170" height="55" class="box box-mysql-light" filter="url(#shadow)"/>
  <text x="495" y="545" text-anchor="middle" class="text-title">MyISAM</text>
  <text x="495" y="563" text-anchor="middle" class="text-sub">表级锁 · 全文索引</text>

  <rect x="605" y="520" width="170" height="55" class="box box-mysql-light" filter="url(#shadow)"/>
  <text x="690" y="545" text-anchor="middle" class="text-title">Memory</text>
  <text x="690" y="563" text-anchor="middle" class="text-sub">内存存储 · Hash 索引</text>

  <!-- Arrow - focus on InnoDB -->
  <line x1="220" y1="578" x2="220" y2="618" class="arrow-mysql"/>
  <text x="240" y="603" class="text-dim">Server 层 API</text>

  <!-- Layer: InnoDB Architecture -->
  <text x="40" y="648" class="layer-label">InnoDB 引擎</text>

  <!-- InnoDB Memory -->
  <rect x="60" y="620" width="340" height="130" class="box" fill="#172554" stroke="#3b82f6" stroke-width="2" rx="10" ry="10" filter="url(#shadow)"/>
  <text x="230" y="642" text-anchor="middle" class="text-title" fill="#93c5fd">InnoDB 内存结构</text>

  <rect x="80" y="652" width="145" height="38" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" rx="6" ry="6"/>
  <text x="152" y="670" text-anchor="middle" class="text-light">Buffer Pool</text>
  <text x="152" y="683" text-anchor="middle" class="text-sub">数据页 + 索引页缓存</text>

  <rect x="240" y="652" width="145" height="38" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" rx="6" ry="6"/>
  <text x="312" y="670" text-anchor="middle" class="text-light">Log Buffer</text>
  <text x="312" y="683" text-anchor="middle" class="text-sub">Redo Log 缓冲区</text>

  <rect x="80" y="698" width="145" height="38" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" rx="6" ry="6"/>
  <text x="152" y="716" text-anchor="middle" class="text-light">Adaptive Hash</text>
  <text x="152" y="729" text-anchor="middle" class="text-sub">自适应哈希索引</text>

  <rect x="240" y="698" width="145" height="38" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1" rx="6" ry="6"/>
  <text x="312" y="716" text-anchor="middle" class="text-light">Change Buffer</text>
  <text x="312" y="729" text-anchor="middle" class="text-sub">二级索引变更缓存</text>

  <!-- InnoDB Disk -->
  <rect x="430" y="620" width="340" height="130" class="box" fill="#1a1a2e" stroke="#818cf8" stroke-width="2" rx="10" ry="10" filter="url(#shadow)"/>
  <text x="600" y="642" text-anchor="middle" class="text-title" fill="#a5b4fc">InnoDB 磁盘结构</text>

  <rect x="450" y="652" width="145" height="38" fill="#25253e" stroke="#818cf8" stroke-width="1" rx="6" ry="6"/>
  <text x="522" y="670" text-anchor="middle" class="text-light">表空间 (.ibd)</text>
  <text x="522" y="683" text-anchor="middle" class="text-sub">数据 + 索引 (B+Tree)</text>

  <rect x="610" y="652" width="145" height="38" fill="#25253e" stroke="#818cf8" stroke-width="1" rx="6" ry="6"/>
  <text x="682" y="670" text-anchor="middle" class="text-light">Redo Log</text>
  <text x="682" y="683" text-anchor="middle" class="text-sub">WAL 日志 (循环写)</text>

  <rect x="450" y="698" width="145" height="38" fill="#25253e" stroke="#818cf8" stroke-width="1" rx="6" ry="6"/>
  <text x="522" y="716" text-anchor="middle" class="text-light">Undo Log</text>
  <text x="522" y="729" text-anchor="middle" class="text-sub">MVCC / 事务回滚</text>

  <rect x="610" y="698" width="145" height="38" fill="#25253e" stroke="#818cf8" stroke-width="1" rx="6" ry="6"/>
  <text x="682" y="716" text-anchor="middle" class="text-light">Doublewrite Buffer</text>
  <text x="682" y="729" text-anchor="middle" class="text-sub">部分写失效恢复</text>

  <!-- Arrow between memory and disk -->
  <line x1="403" y1="680" x2="427" y2="680" class="dashed-mysql"/>
  <text x="415" y="675" class="text-dim" font-size="9">刷盘</text>

  <!-- Layer: File System -->
  <text x="40" y="780" class="layer-label">文件系统</text>
  <rect x="160" y="765" width="500" height="40" class="box" fill="#0f172a" stroke="#475569" stroke-width="2" rx="8" ry="8"/>
  <text x="410" y="790" text-anchor="middle" class="text-light">磁盘文件系统 (ext4 / xfs / NTFS)</text>

  <!-- Arrow -->
  <line x1="410" y1="808" x2="410" y2="838" class="arrow-mysql"/>
